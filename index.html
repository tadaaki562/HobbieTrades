<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HobbieTrades — Login</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: var(--brand-light); display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .auth-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 860px;
      min-height: 520px;
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      animation: fadeIn 0.4s ease;
    }

    /* LEFT PANEL */
    .auth-left {
      background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand) 60%, var(--brand-mid) 100%);
      padding: 52px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .auth-left::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }

    .auth-left::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: white;
      margin-bottom: 12px;
    }

    .auth-logo span { opacity: 0.7; }

    .auth-tagline {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      line-height: 1.7;
      margin-bottom: 36px;
      max-width: 260px;
    }

    .feature-list { display: flex; flex-direction: column; gap: 16px; }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 14px;
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      font-weight: 500;
    }

    .feature-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    /* RIGHT PANEL */
    .auth-right {
      background: var(--white);
      padding: 48px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .auth-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .auth-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    /* TAB TOGGLE */
    .tab-row {
      display: flex;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--white);
      color: var(--brand);
      font-weight: 600;
      box-shadow: var(--shadow-sm);
    }

    .forgot {
      font-size: 12px;
      color: var(--brand);
      text-align: right;
      text-decoration: none;
      display: block;
      margin-top: -10px;
      margin-bottom: 20px;
    }

    .forgot:hover { text-decoration: underline; }

    .google-btn {
      width: 100%;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .google-btn:hover { border-color: var(--brand-mid); background: var(--brand-light); }

    .google-icon {
      width: 18px; height: 18px;
      background: #EA4335;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 11px; font-weight: 700;
    }

    .register-text {
      text-align: center;
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 16px;
    }

    .register-text a { color: var(--brand); text-decoration: none; font-weight: 500; }
    .register-text a:hover { text-decoration: underline; }

    /* REGISTER PANEL (hidden by default) */
    #register-panel { display: none; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <!-- LEFT -->
    <div class="auth-left">
      <div class="auth-logo"><span>Hobbie</span>Trades</div>
      <div class="auth-tagline">Trade your hobby gear with people in your community. No cash needed.</div>
      <div class="feature-list">
        <div class="feature-item"><div class="feature-icon">🔄</div>Trade, don't sell</div>
        <div class="feature-item"><div class="feature-icon">🌱</div>Reduce hobby waste</div>
        <div class="feature-item"><div class="feature-icon">⭐</div>Trusted community</div>
        <div class="feature-item"><div class="feature-icon">💡</div>Smart fair-value matching</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="auth-right">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to continue trading</div>

      <div class="tab-row">
        <button class="tab-btn active" onclick="showTab('login')">Log in</button>
        <button class="tab-btn" onclick="showTab('register')">Register</button>
      </div>

      <!-- LOGIN -->
      <div id="login-panel">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" placeholder="you@example.com" id="login-email"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" placeholder="••••••••" id="login-password"/>
        </div>
        <a href="#" class="forgot">Forgot password?</a>
        <button class="btn btn-primary btn-full btn-lg" onclick="handleLogin()">Log in</button>
        <div class="divider">or</div>
        <button class="google-btn">
          <div class="google-icon">G</div>
          Continue with Google
        </button>
        <div class="register-text">Don't have an account? <a href="#" onclick="showTab('register')">Register</a></div>
      </div>

      <!-- REGISTER -->
      <div id="register-panel">
        <div class="form-group">
          <label class="form-label">Full name</label>
          <input type="text" class="form-control" placeholder="Lynn Espinosa" id="reg-name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" placeholder="you@example.com" id="reg-email"/>
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input type="text" class="form-control" placeholder="e.g. Davao City" id="reg-location"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" placeholder="••••••••" id="reg-password"/>
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="handleRegister()">Create account</button>
        <div class="register-text">Already have an account? <a href="#" onclick="showTab('login')">Log in</a></div>
      </div>
    </div>
  </div>

  <script>
    function showTab(tab) {
      document.getElementById('login-panel').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-panel').style.display = tab === 'register' ? 'block' : 'none';
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
      document.querySelector('.auth-title').textContent = tab === 'login' ? 'Welcome back' : 'Create account';
      document.querySelector('.auth-sub').textContent = tab === 'login' ? 'Sign in to continue trading' : 'Join the HobbieTrades community';
    }

    function handleLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  if (!email || !password) { alert('Please fill in all fields.'); return; }

  fetch('http://localhost:8080/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      // Save user info to localStorage for use across pages
      localStorage.setItem('token', data.token);
      localStorage.setItem('userId', data.user.id);
      localStorage.setItem('userName', data.user.name);
      localStorage.setItem('userEmail', data.user.email);
      localStorage.setItem('userLocation', data.user.location);
      window.location.href = 'browse.html';
    } else {
      alert(data.message || 'Invalid credentials. Please try again.');
    }
  })
  .catch(() => {
    alert('Cannot connect to server. Make sure Spring Boot is running.');
  });
}

    function handleRegister() {
  const name = document.getElementById('reg-name').value;
  const email = document.getElementById('reg-email').value;
  const location = document.getElementById('reg-location').value;
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) { alert('Please fill in all required fields.'); return; }

  fetch('http://localhost:8080/api/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email, password, location })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      alert('Account created! Please log in.');
      showTab('login');
    } else {
      alert(data.message || 'Registration failed. Please try again.');
    }
  })
  .catch(() => {
    alert('Cannot connect to server. Make sure Spring Boot is running.');
  });
}
  </script>
</body>
</html>
