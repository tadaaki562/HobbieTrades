<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HobbieTrades — Messages</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    .messages-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 64px);
    }

    /* ── SIDEBAR ──────────────────────────────────────────── */
    .chat-sidebar {
      border-right: 1px solid var(--border);
      background: var(--white);
      display: flex;
      flex-direction: column;
    }

    .chat-sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-sidebar-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-sidebar-title i { width: 18px; height: 18px; color: var(--text-secondary); }

    .sidebar-badge {
      background: var(--brand);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .chat-list { overflow-y: auto; flex: 1; }

    .chat-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: all 0.2s;
    }
    .chat-item:hover  { background: var(--bg); }
    .chat-item.active { background: var(--brand-light); border-left: 3px solid var(--brand); }

    .chat-ava {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .chat-info { flex: 1; min-width: 0; }
    .chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
    .chat-name    { font-size: 14px; font-weight: 600; color: var(--text); }
    .chat-time    { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }
    .chat-preview { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Status pills */
    .status-pill {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
      display: inline-block;
      margin-top: 6px;
    }
    .status-pending           { background: var(--orange-light); color: var(--orange); border: 1px solid #FDE68A; }
    .status-accepted          { background: var(--brand-light); color: var(--brand-dark); border: 1px solid var(--brand-mid); }
    .status-awaiting-confirm  { background: var(--brand-light); color: var(--brand-dark); border: 1px solid var(--brand-mid); }
    .status-completed         { background: var(--green-light); color: var(--green); border: 1px solid #A7F3D0; }
    .status-declined          { background: var(--red-light); color: var(--red); border: 1px solid #FECACA; }

    .sidebar-empty {
      padding: 40px 20px;
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .sidebar-empty i { width: 32px; height: 32px; color: var(--border); }

    /* ── MAIN CHAT ────────────────────────────────────────── */
    .chat-main {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }

    .chat-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--text-tertiary);
    }
    .chat-empty i { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }

    .chat-header-main {
      background: var(--white);
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }

    .chat-target-user {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; color: inherit;
    }
    .chat-target-user:hover .chat-target-name { color: var(--brand); }
    .chat-target-ava {
      width: 40px; height: 40px; border-radius: 50%;
      color: white; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-target-name { font-size: 16px; font-weight: 700; transition: color 0.2s; }
    .chat-target-meta { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
    .chat-target-meta i { width: 12px; height: 12px; fill: var(--orange); color: var(--orange); }

    .chat-actions { display: flex; gap: 8px; }

    .chat-messages {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .msg-row { display: flex; gap: 12px; max-width: 80%; }
    .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }

    .msg-ava {
      width: 32px; height: 32px; border-radius: 50%;
      color: white; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .msg-bubble {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      box-shadow: var(--shadow-sm);
    }
    .msg-row.me .msg-bubble {
      background: var(--brand);
      color: white;
      border: none;
    }
    .msg-time {
      font-size: 11px; color: var(--text-tertiary);
      margin-top: 6px; text-align: left;
    }
    .msg-row.me .msg-time { text-align: right; }

    /* Trade System Message */
    .msg-sys {
      align-self: center;
      background: var(--brand-light);
      border: 1px solid var(--brand-mid);
      border-radius: var(--radius-md);
      padding: 16px 24px;
      max-width: 90%;
      width: 500px;
      margin: 12px 0;
    }
    .sys-header { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--brand-dark); margin-bottom: 12px; }
    .sys-header i { width: 16px; height: 16px; }
    .trade-box {
      background: var(--white);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 12px;
    }
    .tb-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .tb-row:last-child { margin-bottom: 0; }
    .tb-dir { font-size: 12px; font-weight: 600; color: var(--text-tertiary); width: 40px; text-align: right; }
    .tb-item { display: flex; align-items: center; gap: 8px; flex: 1; font-size: 14px; font-weight: 600; color: var(--text); }
    .tb-item img { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; }
    .tb-item-icon { width: 32px; height: 32px; border-radius: 4px; background: var(--bg); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
    .tb-cash { font-size: 13px; font-weight: 600; color: var(--green); }

    .sys-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

    /* Input area */
    .chat-input-area {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 16px 32px;
    }
    .chat-form {
      display: flex; gap: 12px;
    }
    .chat-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 12px 20px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    .chat-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-glow); }
    .chat-send {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--brand);
      color: white;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chat-send:hover { background: var(--brand-dark); transform: scale(1.05); }

    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white); border-radius: var(--radius-lg); width: 440px; max-width: 90%;
      padding: 24px; position: relative; box-shadow: var(--shadow-lg);
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }

    @media (max-width: 768px) {
      .messages-layout { grid-template-columns: 1fr; height: 100vh; }
      .chat-sidebar { display: flex; }
      .chat-main { display: none; position: fixed; inset: 0; z-index: 200; height: 100vh; }
      .chat-main.active { display: flex; }
      .chat-header-main { padding: 12px 16px; }
      .chat-messages { padding: 16px; }
      .chat-input-area { padding: 12px 16px; }
      .mobile-back { display: block; border: none; background: transparent; font-size: 20px; margin-right: 12px; }
    }
    .mobile-back { display: none; }
    @media (min-width: 769px) { .mobile-back { display: none !important; } }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="browse.html" class="logo">HobbieTrades</a>
  <div class="nav-links" style="margin-left:auto">
    <a href="browse.html"        class="nav-link">Browse</a>
    <a href="for-you.html"       class="nav-link">For You</a>
    <a href="messages.html"      class="nav-link active">Messages</a>
    <a href="create-listing.html" class="nav-link">+ List Item</a>
    <a href="profile.html"       class="nav-avatar" id="nav-avatar">?</a>
  </div>
</nav>

<div class="messages-layout">
  
  <aside class="chat-sidebar" id="sidebar">
    <div class="chat-sidebar-header">
      <div class="chat-sidebar-title"><i data-feather="message-square"></i> Messages</div>
    </div>
    <div class="chat-list" id="chat-list">
      <div class="sidebar-empty">
        <i data-feather="loader" class="spinner"></i>
        Loading...
      </div>
    </div>
  </aside>

  <main class="chat-main" id="chat-main">
    <div class="chat-empty" id="chat-empty">
      <i data-feather="message-circle"></i>
      <div>Select a conversation to start trading</div>
    </div>

    <div id="chat-active" style="display:none; flex-direction:column; height:100%">
      <div class="chat-header-main">
        <div style="display:flex;align-items:center">
          <button class="mobile-back" onclick="closeMobileChat()"><i data-feather="arrow-left"></i></button>
          <a href="#" class="chat-target-user" id="chat-target-link">
            <div class="chat-target-ava" id="chat-target-ava">?</div>
            <div>
              <div class="chat-target-name" id="chat-target-name">...</div>
              <div class="chat-target-meta">
                <i data-feather="star"></i> <span id="chat-target-rating">0.0</span>
              </div>
            </div>
          </a>
        </div>
        <div class="chat-actions" id="chat-header-actions">
          <!-- Propose/Review buttons go here -->
        </div>
      </div>

      <div class="chat-messages" id="chat-messages"></div>

      <div class="chat-input-area">
        <form class="chat-form" onsubmit="event.preventDefault(); sendMessage();">
          <input type="text" class="chat-input" id="msg-input" placeholder="Type a message..." autocomplete="off"/>
          <button type="submit" class="chat-send"><i data-feather="send"></i></button>
        </form>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="status-modal">
  <div class="modal">
    <div class="modal-title" id="sm-title">Confirm</div>
    <div class="modal-desc" id="sm-desc">Are you sure?</div>
    <div style="display:flex;gap:12px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeStatusModal()">Cancel</button>
      <button class="btn btn-primary" id="sm-btn" onclick="execStatusAction()">Confirm</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  feather.replace();

  const API = window.HobbieAPI ? window.HobbieAPI.baseUrl : (
    window.location.hostname.includes('localhost') || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:8080'
      : 'https://hobbietrades-backend.onrender.com'
  );
  if (window.HobbieAPI) window.HobbieAPI.wakeBackend();

  const loggedInUserId = parseInt(localStorage.getItem('userId'), 10);
  if (!loggedInUserId) window.location.href = 'index.html';

  document.getElementById('nav-avatar').textContent = (localStorage.getItem('userName') || '?').charAt(0).toUpperCase();

  const AVATAR_COLORS = ['#AFA9EC','#9FE1CB','#F5C4B3','#85B7EB','#F7D08A','#B5EAD7','#C7CEEA'];
  function colorFor(id) { return AVATAR_COLORS[(id||0) % AVATAR_COLORS.length]; }
  function getInitials(n) { return (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
  function formatPeso(v) { return '₱' + Number(v||0).toLocaleString('en-PH'); }
  function escapeHtml(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }

  let threads = [];
  let activeTargetId = null;
  let activeTrade = null;

  async function loadThreads() {
    try {
      const res = await fetch(`${API}/api/messages/threads?userId=${loggedInUserId}`);
      if (!res.ok) throw new Error();
      threads = await res.json();
      renderSidebar();
      
      const urlParams = new URLSearchParams(window.location.search);
      const preselect = urlParams.get('userId');
      if (preselect) openChat(parseInt(preselect, 10));

    } catch (e) {
      document.getElementById('chat-list').innerHTML = `
        <div class="sidebar-empty">
          <i data-feather="alert-triangle"></i>
          <div>Could not load messages.</div>
        </div>`;
      feather.replace();
    }
  }

  function renderSidebar() {
    const list = document.getElementById('chat-list');
    if (threads.length === 0) {
      list.innerHTML = `
        <div class="sidebar-empty">
          <i data-feather="inbox"></i>
          <div>No messages yet.</div>
        </div>`;
      feather.replace();
      return;
    }

    list.innerHTML = threads.map(t => {
      const other = t.otherUser;
      const ini = getInitials(other.name);
      const col = colorFor(other.id);
      const isActive = other.id === activeTargetId;
      const lm = t.lastMessage;
      let prev = 'No messages';
      let time = '';
      if (lm) {
        prev = lm.tradeId ? '[Trade Update]' : lm.content;
        const d = new Date(lm.createdAt);
        time = d.toLocaleDateString() === new Date().toLocaleDateString()
          ? d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
          : d.toLocaleDateString([],{month:'short',day:'numeric'});
      }
      
      let statusHtml = '';
      if (t.activeTrade) {
        statusHtml = `<div class="status-pill status-${t.activeTrade.status.toLowerCase()}">${t.activeTrade.status}</div>`;
      }

      return `
        <div class="chat-item ${isActive ? 'active' : ''}" onclick="openChat(${other.id})">
          <div class="chat-ava" style="background:${col}">${ini}</div>
          <div class="chat-info">
            <div class="chat-header">
              <span class="chat-name">${escapeHtml(other.name)}</span>
              <span class="chat-time">${time}</span>
            </div>
            <div class="chat-preview">${escapeHtml(prev)}</div>
            ${statusHtml}
          </div>
        </div>
      `;
    }).join('');
    feather.replace();
  }

  async function openChat(targetId) {
    activeTargetId = targetId;
    renderSidebar();

    document.getElementById('chat-empty').style.display = 'none';
    document.getElementById('chat-active').style.display = 'flex';
    if (window.innerWidth <= 768) {
      document.getElementById('chat-main').classList.add('active');
    }

    let targetUser = threads.find(t => t.otherUser.id === targetId)?.otherUser;
    if (!targetUser) {
      try {
        const res = await fetch(`${API}/api/users/${targetId}/profile`);
        if (res.ok) {
          const data = await res.json();
          if (data.success && data.user) targetUser = data.user;
        }
      } catch(e) {}
    }
    if(targetUser) {
      document.getElementById('chat-target-link').href = `profile.html?id=${targetUser.id}`;
      document.getElementById('chat-target-name').textContent = escapeHtml(targetUser.name);
      document.getElementById('chat-target-ava').textContent = getInitials(targetUser.name);
      document.getElementById('chat-target-ava').style.background = colorFor(targetUser.id);
      document.getElementById('chat-target-rating').textContent = (parseFloat(targetUser.rating)||0).toFixed(1);
    }

    activeTrade = threads.find(t => t.otherUser.id === targetId)?.activeTrade;
    updateHeaderActions(targetId);

    loadMessages();
  }

  function closeMobileChat() {
    document.getElementById('chat-main').classList.remove('active');
  }

  function updateHeaderActions(targetId) {
    const act = document.getElementById('chat-header-actions');
    if (!activeTrade) {
      act.innerHTML = `<a href="propose-trade.html?targetUserId=${targetId}" class="btn btn-primary btn-sm"><i data-feather="refresh-cw"></i> Propose Trade</a>`;
    } else if (activeTrade.status === 'COMPLETED') {
      act.innerHTML = `<a href="review.html?tradeId=${activeTrade.id}" class="btn btn-outline btn-sm"><i data-feather="star"></i> Leave Review</a>`;
    } else {
      act.innerHTML = `<a href="propose-trade.html?targetUserId=${targetId}" class="btn btn-outline btn-sm">View Trade Details</a>`;
    }
    feather.replace();
  }

  async function loadMessages() {
    const box = document.getElementById('chat-messages');
    box.innerHTML = `<div style="text-align:center;padding:20px"><span class="spinner"></span></div>`;
    
    try {
      const res = await fetch(`${API}/api/messages?user1Id=${loggedInUserId}&user2Id=${activeTargetId}`);
      if (!res.ok) throw new Error();
      const msgs = await res.json();
      
      if (msgs.length === 0) {
        box.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-tertiary)">Say hello to start the conversation!</div>`;
        return;
      }

      box.innerHTML = msgs.map(m => {
        const isMe = m.sender.id === loggedInUserId;
        const d = new Date(m.createdAt);
        const time = d.toLocaleDateString() === new Date().toLocaleDateString()
          ? d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
          : d.toLocaleDateString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

        if (m.tradeId && !m.content) return renderSysMessage(m);

        return `
          <div class="msg-row ${isMe ? 'me' : ''}">
            <div class="msg-ava" style="background:${colorFor(m.sender.id)}">${getInitials(m.sender.name)}</div>
            <div>
              <div class="msg-bubble">${escapeHtml(m.content)}</div>
              <div class="msg-time">${time}</div>
            </div>
          </div>
        `;
      }).join('');
      feather.replace();
      box.scrollTop = box.scrollHeight;
    } catch(e) {
      box.innerHTML = `<div style="text-align:center;padding:20px;color:var(--red)">Failed to load messages</div>`;
    }
  }

  function renderSysMessage(m) {
    if (!activeTrade) return '';
    const isReceiver = activeTrade.targetUser.id === loggedInUserId;
    const isProposer = activeTrade.proposingUser.id === loggedInUserId;
    
    let title = 'Trade Update';
    let bodyHtml = '';
    let actions = '';

    const iAmSending = isProposer ? activeTrade.proposerItem : activeTrade.targetItem;
    const iAmReceiving = isProposer ? activeTrade.targetItem : activeTrade.proposerItem;
    const cashOffered = activeTrade.cashOffered || 0;

    const renderItem = (item) => {
      if(!item) return `<div class="tb-item"><div class="tb-item-icon"><i data-feather="minus"></i></div><span>Nothing</span></div>`;
      const url = window.HobbieAPI ? window.HobbieAPI.resolveImageUrl(item.photoUrl, item.id) : (item.photoUrl ? `${API}${item.photoUrl}` : `${API}/api/items/${item.id}/photo`);
      return `
        <div class="tb-item">
          ${url ? `<img src="${url}" onerror="this.style.display='none'"/>` : `<div class="tb-item-icon"><i data-feather="box"></i></div>`}
          <span>${escapeHtml(item.title)}</span>
        </div>`;
    };

    let cashHtml = '';
    if (cashOffered > 0) {
      cashHtml = `<div class="tb-row"><div class="tb-dir">Cash</div><div class="tb-item"><span class="tb-cash">+ ${formatPeso(cashOffered)}</span> (from Proposer)</div></div>`;
    }

    bodyHtml = `
      <div class="trade-box">
        <div class="tb-row">
          <div class="tb-dir">Send</div>
          ${renderItem(iAmSending)}
        </div>
        <div class="tb-row">
          <div class="tb-dir">Get</div>
          ${renderItem(iAmReceiving)}
        </div>
        ${cashHtml}
      </div>
      <div style="font-size:13px;color:var(--text-secondary)">Status: <strong>${activeTrade.status}</strong></div>
    `;

    if (activeTrade.status === 'PENDING') {
      title = isProposer ? 'You proposed a trade' : 'New trade proposal';
      if (isReceiver) {
        actions = `
          <button class="btn btn-outline btn-sm" onclick="promptStatusAction('DECLINED')">Decline</button>
          <button class="btn btn-primary btn-sm" onclick="promptStatusAction('ACCEPTED')">Accept Trade</button>
        `;
      } else {
        actions = `<button class="btn btn-outline btn-sm" onclick="promptStatusAction('DECLINED')">Cancel Proposal</button>`;
      }
    } else if (activeTrade.status === 'ACCEPTED') {
      title = 'Trade Accepted! Time to meet up.';
      actions = `<button class="btn btn-primary btn-sm" onclick="promptStatusAction('AWAITING_CONFIRM')">Mark as Completed</button>`;
    } else if (activeTrade.status === 'AWAITING_CONFIRM') {
      title = 'One party marked as completed';
      actions = `<button class="btn btn-primary btn-sm" onclick="promptStatusAction('COMPLETED')">Confirm Completion</button>`;
    } else if (activeTrade.status === 'COMPLETED') {
      title = 'Trade Completed!';
      actions = `<a href="review.html?tradeId=${activeTrade.id}" class="btn btn-outline btn-sm">Leave a Review</a>`;
    } else if (activeTrade.status === 'DECLINED') {
      title = 'Trade Declined';
    }

    return `
      <div class="msg-sys">
        <div class="sys-header"><i data-feather="refresh-cw"></i> ${title}</div>
        ${bodyHtml}
        ${actions ? `<div class="sys-actions">${actions}</div>` : ''}
      </div>
    `;
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const txt = input.value.trim();
    if (!txt || !activeTargetId) return;

    input.value = '';
    
    try {
      await fetch(`${API}/api/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sender: { id: loggedInUserId },
          receiver: { id: activeTargetId },
          content: txt
        })
      });
      loadMessages();
      loadThreads();
    } catch(e) {}
  }

  let pendingAction = null;
  function promptStatusAction(newStatus) {
    pendingAction = newStatus;
    const modal = document.getElementById('status-modal');
    const title = document.getElementById('sm-title');
    const desc = document.getElementById('sm-desc');
    const btn = document.getElementById('sm-btn');

    if (newStatus === 'ACCEPTED') {
      title.textContent = 'Accept Trade?';
      desc.textContent = 'You agree to swap items. You can coordinate meetup details in the chat.';
      btn.textContent = 'Accept Trade';
      btn.className = 'btn btn-primary';
    } else if (newStatus === 'DECLINED') {
      title.textContent = 'Decline Trade?';
      desc.textContent = 'This will cancel the proposal. You can still chat and propose a different trade later.';
      btn.textContent = 'Decline Trade';
      btn.className = 'btn btn-danger';
    } else if (newStatus === 'AWAITING_CONFIRM') {
      title.textContent = 'Mark as Completed?';
      desc.textContent = 'Click this when you have successfully exchanged the items. The other person will need to confirm.';
      btn.textContent = 'Mark Completed';
      btn.className = 'btn btn-primary';
    } else if (newStatus === 'COMPLETED') {
      title.textContent = 'Confirm Completion?';
      desc.textContent = 'This will finalize the trade and you will both be able to leave a review.';
      btn.textContent = 'Finalize Trade';
      btn.className = 'btn btn-primary';
    }
    
    modal.classList.add('open');
  }

  function closeStatusModal() {
    document.getElementById('status-modal').classList.remove('open');
    pendingAction = null;
  }

  async function execStatusAction() {
    if (!pendingAction || !activeTrade) return;
    const btn = document.getElementById('sm-btn');
    btn.disabled = true;

    try {
      await fetch(`${API}/api/trades/${activeTrade.id}/status`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: pendingAction })
      });
      closeStatusModal();
      await loadThreads();
      if (activeTargetId) {
        await openChat(activeTargetId);
      }
    } catch(e) {
      alert('Failed to update status');
    } finally {
      btn.disabled = false;
    }
  }

  loadThreads();
</script>
</body>
</html>
