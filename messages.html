<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HobbieTrades — Messages</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .messages-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: calc(100vh - 60px);
    }

    /* SIDEBAR */
    .chat-sidebar {
      border-right: 1px solid var(--border);
      background: var(--white);
      display: flex;
      flex-direction: column;
    }

    .chat-sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-badge {
      background: var(--brand);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .chat-list { overflow-y: auto; flex: 1; }

    .chat-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: background 0.15s;
    }

    .chat-item:hover { background: var(--bg); }
    .chat-item.active { background: var(--brand-light); }

    .chat-ava {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .chat-preview { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .chat-time { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }

    .status-pill {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
      margin-top: 4px;
    }
    .status-pending  { background: #FEF3E2; color: #633806; }
    .status-accepted { background: var(--green-light); color: #085041; }
    .status-completed{ background: #E6F1FB; color: #0C447C; }
    .status-declined { background: #FEE; color: var(--red); }

    .sidebar-empty {
      padding: 40px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* MAIN CHAT */
    .chat-main {
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .chat-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .chat-header-sub  { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg-bubble {
      max-width: 65%;
      padding: 10px 14px;
      font-size: 13px;
      border-radius: 12px;
      line-height: 1.5;
    }

    .msg-in  { background: var(--white); color: var(--text); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg-out { background: var(--brand); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

    .msg-time { font-size: 10px; color: var(--text-tertiary); margin-top: 3px; }
    .msg-time-right { text-align: right; }

    /* TRADE PROPOSAL BUBBLE */
    .trade-bubble {
      background: var(--brand-light);
      border: 1.5px solid var(--brand-mid);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      align-self: flex-start;
      max-width: 75%;
    }

    .trade-bubble-title { font-size: 12px; font-weight: 700; color: var(--brand-dark); margin-bottom: 6px; }
    .trade-bubble-items { font-size: 13px; color: var(--brand); font-weight: 500; margin-bottom: 10px; }

    .trade-actions { display: flex; gap: 8px; }
    .trade-btn { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .trade-btn-accept  { background: var(--brand); color: white; }
    .trade-btn-accept:hover { background: var(--brand-dark); }
    .trade-btn-counter { background: var(--white); color: var(--text); border: 1px solid var(--border) !important; }
    .trade-btn-decline { background: #FEE; color: var(--red); }

    .trade-done-label {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
    }
    .trade-done-accepted  { background: var(--green-light); color: #085041; }
    .trade-done-declined  { background: #FEE; color: var(--red); }
    .trade-done-completed { background: #E6F1FB; color: #0C447C; }

    /* AGREED BANNER */
    .agreed-banner {
      background: #FEF3E2;
      border: 1.5px solid var(--orange);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 20px;
    }

    .agreed-banner-text { font-size: 13px; color: #633806; }
    .agreed-banner-text strong { display: block; margin-bottom: 2px; }

    /* INPUT */
    .chat-input-bar {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 9px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input:focus { border-color: var(--brand-mid); }

    .send-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--brand);
      color: white;
      border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .send-btn:hover { background: var(--brand-dark); transform: scale(1.05); }

    /* EMPTY STATE */
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      gap: 12px;
      font-size: 13px;
    }

    .chat-empty-icon { font-size: 40px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="browse.html" class="logo"><span>Hobbie</span>Trades</a>
    <div class="nav-search"><span class="search-icon">🔍</span><input type="text" placeholder="Search items to trade..."/></div>
    <div class="nav-links">
      <a href="browse.html" class="nav-link">Browse</a>
      <a href="create-listing.html" class="nav-link">+ List Item</a>
      <a href="messages.html" class="nav-link active">Messages</a>
      <a href="index.html" class="nav-avatar" id="nav-avatar">?</a>
    </div>
  </nav>

  <div class="messages-layout">
    <!-- SIDEBAR -->
    <div class="chat-sidebar">
      <div class="chat-sidebar-header">
        Messages
        <span class="sidebar-badge" id="trade-count" style="display:none">0</span>
      </div>
      <div class="chat-list" id="chat-list">
        <div class="sidebar-empty">Loading trades...</div>
      </div>
    </div>

    <!-- CHAT MAIN -->
    <div class="chat-main" id="chat-main">
      <div class="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <div>Select a trade to view the conversation</div>
      </div>
    </div>
  </div>

  <script>
    // ─── State ────────────────────────────────────────────────────────────────
    const loggedInUserId   = parseInt(localStorage.getItem('userId')) || null;
    const loggedInUserName = localStorage.getItem('userName') || 'Me';
    const params           = new URLSearchParams(window.location.search);

    // The trade that was just proposed (may arrive via URL from propose-trade.html)
    const urlTradeId   = params.get('tradeId') ? parseInt(params.get('tradeId')) : null;
    const urlItemTitle = params.get('itemTitle')  ? decodeURIComponent(params.get('itemTitle'))  : null;
    const urlItemEmoji = params.get('itemEmoji')  ? decodeURIComponent(params.get('itemEmoji'))  : null;
    const urlItemValue = params.get('itemValue')  ? parseInt(params.get('itemValue'))             : null;
    const urlSeller    = params.get('sellerName') ? decodeURIComponent(params.get('sellerName')) : null;

    // Nav avatar initial
    if (loggedInUserName) {
      document.getElementById('nav-avatar').textContent = loggedInUserName.charAt(0).toUpperCase();
    }

    // Avatar colour palette (consistent per user ID)
    const AVATAR_COLORS = ['#AFA9EC','#9FE1CB','#F5C4B3','#85B7EB','#F7D08A','#B5EAD7','#C7CEEA'];
    function avatarColor(id) { return AVATAR_COLORS[id % AVATAR_COLORS.length]; }

    function getInitials(name) {
      if (!name) return '??';
      return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function getCategoryEmoji(category) {
      const map = { Cameras:'📷', Instruments:'🎸', Sports:'🛹', Gaming:'🎮', Art:'🎨', Craft:'🧵', Other:'📦' };
      return map[category] || '📦';
    }

    function formatRelativeTime(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const diff = Math.floor((Date.now() - date) / 1000);
      if (diff < 60)   return 'Just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400)return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    // ─── Load trades from API ─────────────────────────────────────────────────
    let allTrades       = [];
    let activeTrade     = null;

    function loadTrades() {
      if (!loggedInUserId) {
        document.getElementById('chat-list').innerHTML =
          '<div class="sidebar-empty">Please <a href="index.html">log in</a> to see your trades.</div>';
        return;
      }

      fetch(`http://localhost:8080/api/trades/user/${loggedInUserId}`)
        .then(res => res.json())
        .then(trades => {
          allTrades = trades;

          if (trades.length === 0) {
            document.getElementById('chat-list').innerHTML =
              '<div class="sidebar-empty">No trades yet. <a href="browse.html">Browse items</a> to propose one!</div>';
            return;
          }

          // Show count badge
          const badge = document.getElementById('trade-count');
          badge.textContent = trades.length;
          badge.style.display = 'inline';

          renderSidebar(trades);

          // Auto-open: prefer the trade that just came from propose-trade.html
          if (urlTradeId) {
            const match = trades.find(t => t.id === urlTradeId);
            if (match) { openTrade(match); return; }
          }
          // Otherwise open the most recent trade
          openTrade(trades[0]);
        })
        .catch(() => {
          document.getElementById('chat-list').innerHTML =
            '<div class="sidebar-empty">Could not load trades. Make sure Spring Boot is running.</div>';
        });
    }

    function renderSidebar(trades) {
      document.getElementById('chat-list').innerHTML = trades.map(trade => {
        const isProposer = trade.proposer && trade.proposer.id === loggedInUserId;
        const other      = isProposer ? trade.receiver : trade.proposer;
        const myItem     = isProposer ? trade.offeredItem   : trade.requestedItem;
        const theirItem  = isProposer ? trade.requestedItem : trade.offeredItem;
        const otherName  = other ? other.name : 'Unknown';
        const initials   = getInitials(otherName);
        const color      = avatarColor(other ? other.id : 0);
        const emoji      = theirItem ? getCategoryEmoji(theirItem.category) : '📦';
        const preview    = `${isProposer ? 'You offered' : 'Trade proposal'}: ${emoji} ${theirItem ? theirItem.title : ''}`;
        const timeStr    = formatRelativeTime(trade.createdAt);

        const statusClass = {
          pending:   'status-pending',
          accepted:  'status-accepted',
          completed: 'status-completed',
          declined:  'status-declined'
        }[trade.status] || 'status-pending';

        const statusLabel = {
          pending:   '⏳ Pending',
          accepted:  '✓ Accepted',
          completed: '✅ Completed',
          declined:  '✗ Declined'
        }[trade.status] || trade.status;

        return `
          <div class="chat-item" id="trade-item-${trade.id}" onclick="openTrade(allTrades.find(t => t.id === ${trade.id}))">
            <div class="chat-ava" style="background:${color}">${initials}</div>
            <div class="chat-info">
              <div class="chat-name">${otherName}</div>
              <div class="chat-preview">${preview}</div>
              <span class="status-pill ${statusClass}">${statusLabel}</span>
            </div>
            <div class="chat-time">${timeStr}</div>
          </div>
        `;
      }).join('');
    }

    // ─── Open a trade conversation ─────────────────────────────────────────────
    function openTrade(trade) {
      if (!trade) return;
      activeTrade = trade;

      // Highlight sidebar item
      document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
      const sidebarEl = document.getElementById(`trade-item-${trade.id}`);
      if (sidebarEl) sidebarEl.classList.add('active');

      const isProposer = trade.proposer && trade.proposer.id === loggedInUserId;
      const other      = isProposer ? trade.receiver     : trade.proposer;
      const myItem     = isProposer ? trade.offeredItem  : trade.requestedItem;
      const theirItem  = isProposer ? trade.requestedItem : trade.offeredItem;

      const otherName    = other     ? other.name         : 'Unknown';
      const otherRating  = other     ? (other.rating || 0).toFixed(1) : '0.0';
      const otherTrades  = other     ? (other.tradeCount || 0)        : 0;
      const otherInitials= getInitials(otherName);
      const otherColor   = avatarColor(other ? other.id : 0);

      const myEmoji    = myItem    ? getCategoryEmoji(myItem.category)    : '📦';
      const theirEmoji = theirItem ? getCategoryEmoji(theirItem.category) : '📦';
      const myTitle    = myItem    ? myItem.title    : 'Your item';
      const theirTitle = theirItem ? theirItem.title : 'Their item';
      const myValue    = myItem    ? parseFloat(myItem.estimatedValue)    : 0;
      const theirValue = theirItem ? parseFloat(theirItem.estimatedValue) : 0;

      // Agreed banner visibility
      const showAgreed    = trade.status === 'accepted';
      const showCompleted = trade.status === 'completed';

      // Trade action buttons — only show for receiver if still pending
      const showActions = trade.status === 'pending' && !isProposer;

      let tradeBubbleActions = '';
      if (showActions) {
        tradeBubbleActions = `
          <div class="trade-actions">
            <button class="trade-btn trade-btn-accept"  onclick="acceptTrade(${trade.id})">✓ Accept</button>
            <button class="trade-btn trade-btn-counter" onclick="alert('Counter offer coming soon!')">Counter</button>
            <button class="trade-btn trade-btn-decline" onclick="declineTrade(${trade.id})">✗ Decline</button>
          </div>`;
      } else if (trade.status === 'pending' && isProposer) {
        tradeBubbleActions = `<span class="trade-done-label" style="background:#FEF3E2;color:#633806">⏳ Waiting for response</span>`;
      } else if (trade.status !== 'pending') {
        const doneClass = {
          accepted:  'trade-done-accepted',
          completed: 'trade-done-completed',
          declined:  'trade-done-declined'
        }[trade.status] || '';
        const doneLabel = {
          accepted:  '✓ Accepted',
          completed: '✅ Completed',
          declined:  '✗ Declined'
        }[trade.status] || trade.status;
        tradeBubbleActions = `<span class="trade-done-label ${doneClass}">${doneLabel}</span>`;
      }

      document.getElementById('chat-main').innerHTML = `
        <!-- HEADER -->
        <div class="chat-header">
          <div class="chat-ava" style="background:${otherColor};width:36px;height:36px;font-size:12px">${otherInitials}</div>
          <div>
            <div class="chat-header-name">${otherName}</div>
            <div class="chat-header-sub">★ ${otherRating} · ${otherTrades} trades</div>
          </div>
          <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
            <span class="status-pill ${({pending:'status-pending',accepted:'status-accepted',completed:'status-completed',declined:'status-declined'})[trade.status]||'status-pending'}">
              ${({pending:'⏳ Pending',accepted:'✓ Accepted',completed:'✅ Completed',declined:'✗ Declined'})[trade.status]||trade.status}
            </span>
          </div>
        </div>

        <!-- MESSAGES AREA -->
        <div class="chat-messages" id="chat-messages">

          <!-- Opening message (proposer) -->
          <div ${isProposer ? 'style="align-self:flex-end"' : ''}>
            <div class="msg-bubble ${isProposer ? 'msg-out' : 'msg-in'}">
              Hi! I'm interested in trading for your ${theirTitle}. Would you like to swap?
            </div>
            <div class="msg-time ${isProposer ? 'msg-time-right' : ''}">${formatRelativeTime(trade.createdAt)}</div>
          </div>

          <!-- Trade proposal bubble -->
          <div>
            <div class="trade-bubble">
              <div class="trade-bubble-title">🔄 Trade Proposal</div>
              <div class="trade-bubble-items">
                ${myEmoji} ${myTitle} (~₱${myValue.toLocaleString()})
                ⇄
                ${theirEmoji} ${theirTitle} (~₱${theirValue.toLocaleString()})
              </div>
              ${tradeBubbleActions}
            </div>
            <div class="msg-time">${formatRelativeTime(trade.createdAt)}</div>
          </div>

          ${showCompleted ? `
          <div style="align-self:center">
            <div class="msg-bubble" style="background:var(--green-light);border:1px solid #97C459;color:#3B6D11;text-align:center">
              ✅ Trade completed! Both parties confirmed.
            </div>
          </div>` : ''}

        </div>

        <!-- AGREED BANNER (shown when accepted, waiting for confirm) -->
        ${showAgreed ? `
        <div class="agreed-banner" id="agreed-banner">
          <div class="agreed-banner-text">
            <strong>🤝 Trade agreed!</strong>
            Meet up and exchange items in person, then confirm below.
          </div>
          <button class="btn btn-primary btn-sm" onclick="confirmTrade(${trade.id})">Confirm trade done</button>
        </div>` : ''}

        <!-- INPUT BAR -->
        <div class="chat-input-bar">
          <input class="chat-input" type="text" placeholder="Type a message..."
                 id="msg-input" onkeypress="if(event.key==='Enter') sendMessage()"/>
          <button class="send-btn" onclick="sendMessage()">↑</button>
        </div>
      `;
    }

    // ─── Trade actions ────────────────────────────────────────────────────────
    function acceptTrade(tradeId) {
      fetch(`http://localhost:8080/api/trades/${tradeId}/accept`, { method: 'PUT' })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            // Update local state
            const t = allTrades.find(t => t.id === tradeId);
            if (t) t.status = 'accepted';
            renderSidebar(allTrades);
            openTrade(t);
          } else {
            alert(data.message || 'Could not accept trade.');
          }
        })
        .catch(() => alert('Could not reach server.'));
    }

    function declineTrade(tradeId) {
      fetch(`http://localhost:8080/api/trades/${tradeId}/decline`, { method: 'PUT' })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            const t = allTrades.find(t => t.id === tradeId);
            if (t) t.status = 'declined';
            renderSidebar(allTrades);
            openTrade(t);
          } else {
            alert(data.message || 'Could not decline trade.');
          }
        })
        .catch(() => alert('Could not reach server.'));
    }

    function confirmTrade(tradeId) {
      if (!loggedInUserId) { alert('Please log in first.'); return; }
      fetch(`http://localhost:8080/api/trades/${tradeId}/confirm`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: loggedInUserId })
      })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            const t = allTrades.find(t => t.id === tradeId);
            if (t) t.status = data.status;

            if (data.status === 'completed') {
              // Both confirmed — go to review page
              renderSidebar(allTrades);
              const isProposer = t.proposer && t.proposer.id === loggedInUserId;
              const other      = isProposer ? t.receiver    : t.proposer;
              const theirItem  = isProposer ? t.requestedItem : t.offeredItem;
              const otherName  = other ? other.name : 'Trader';
              const theirEmoji = theirItem ? getCategoryEmoji(theirItem.category) : '📦';
              const theirValue = theirItem ? theirItem.estimatedValue : 0;
              const revieweeId = other ? other.id : '';

              window.location.href =
                `review.html?tradeId=${tradeId}` +
                `&revieweeId=${revieweeId}` +
                `&itemTitle=${encodeURIComponent(theirItem ? theirItem.title : '')}` +
                `&itemEmoji=${encodeURIComponent(theirEmoji)}` +
                `&itemValue=${theirValue}` +
                `&sellerName=${encodeURIComponent(otherName)}` +
                `&sellerInitials=${encodeURIComponent(getInitials(otherName))}` +
                `&sellerColor=${encodeURIComponent(avatarColor(other ? other.id : 0))}` +
                `&sellerTrades=${other ? other.tradeCount || 0 : 0}`;
            } else {
              alert('Your confirmation recorded! Waiting for the other party to confirm.');
              openTrade(t);
            }
          } else {
            alert(data.message || 'Could not confirm trade.');
          }
        })
        .catch(() => alert('Could not reach server.'));
    }

    // ─── Messaging ────────────────────────────────────────────────────────────
    function sendMessage() {
      const input = document.getElementById('msg-input');
      if (!input) return;
      const text = input.value.trim();
      if (!text) return;
      const msgs = document.getElementById('chat-messages');
      msgs.innerHTML += `
        <div style="align-self:flex-end">
          <div class="msg-bubble msg-out">${text}</div>
          <div class="msg-time msg-time-right">Just now</div>
        </div>
      `;
      input.value = '';
      msgs.scrollTop = msgs.scrollHeight;
    }

    // ─── Init ─────────────────────────────────────────────────────────────────
    loadTrades();
  </script>
</body>
</html>
