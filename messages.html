<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HobbieTrades — Messages</title>
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    .messages-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 64px);
    }

    /* ── SIDEBAR ──────────────────────────────────────────── */
    .chat-sidebar {
      border-right: 1px solid var(--border);
      background: var(--white);
      display: flex;
      flex-direction: column;
    }

    .chat-sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-sidebar-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-sidebar-title i { width: 18px; height: 18px; color: var(--text-secondary); }

    .sidebar-badge {
      background: var(--brand);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .chat-list { overflow-y: auto; flex: 1; }

    .chat-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: all 0.2s;
    }
    .chat-item:hover  { background: var(--bg); }
    .chat-item.active { background: var(--brand-light); border-left: 3px solid var(--brand); }

    .chat-ava {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .chat-info { flex: 1; min-width: 0; }
    .chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
    .chat-name    { font-size: 14px; font-weight: 600; color: var(--text); }
    .chat-time    { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }
    .chat-preview { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Status pills */
    .status-pill {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
      display: inline-block;
      margin-top: 6px;
    }
    .status-pending           { background: var(--orange-light); color: var(--orange); border: 1px solid #FDE68A; }
    .status-accepted          { background: var(--brand-light); color: var(--on-brand); border: 1px solid var(--border-brand); }
    .status-awaiting-confirm  { background: var(--brand-light); color: var(--on-brand); border: 1px solid var(--border-brand); }
    .status-completed         { background: var(--green-light); color: var(--on-green); border: 1px solid var(--border-green); }
    .status-declined          { background: var(--red-light); color: var(--red); border: 1px solid #FECACA; }

    .sidebar-empty {
      padding: 40px 20px;
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .sidebar-empty i { width: 32px; height: 32px; color: var(--border); }

    /* ── MAIN CHAT ────────────────────────────────────────── */
    .chat-main {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }

    .chat-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--text-tertiary);
    }
    .chat-empty i { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }

    .chat-header-main {
      background: var(--white);
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }

    .chat-target-user {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; color: inherit;
    }
    .chat-target-user:hover .chat-target-name { color: var(--brand); }
    .chat-target-ava {
      width: 40px; height: 40px; border-radius: 50%;
      color: white; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-target-name { font-size: 16px; font-weight: 700; transition: color 0.2s; }
    .chat-target-meta { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
    .chat-target-meta i { width: 12px; height: 12px; fill: var(--orange); color: var(--orange); }

    .chat-actions { display: flex; gap: 8px; }

    .chat-messages {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .msg-row { display: flex; gap: 12px; max-width: 80%; }
    .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }

    .msg-ava {
      width: 32px; height: 32px; border-radius: 50%;
      color: white; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .msg-bubble {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      box-shadow: var(--shadow-sm);
    }
    .msg-row.me .msg-bubble {
      background: var(--brand);
      color: white;
      border: none;
    }
    .msg-time {
      font-size: 11px; color: var(--text-tertiary);
      margin-top: 6px; text-align: left;
    }
    .msg-row.me .msg-time { text-align: right; }

    /* Inline system / trade status updates */
    .msg-sys-event {
      align-self: center;
      max-width: 520px;
      width: 100%;
      text-align: center;
      margin: 4px 0;
    }
    .msg-sys-event-inner {
      display: inline-flex;
      align-items: flex-start;
      gap: 8px;
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      line-height: 1.45;
      color: var(--text-secondary);
      text-align: left;
    }
    .msg-sys-event-inner i {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      margin-top: 2px;
      color: var(--brand);
    }
    .msg-sys-event-time {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 6px;
    }

    /* Trade System Message */
    .msg-sys {
      align-self: center;
      background: var(--brand-light);
      border: 1px solid var(--brand-mid);
      border-radius: var(--radius-md);
      padding: 16px 24px;
      max-width: 90%;
      width: 500px;
      margin: 12px 0;
    }
    .sys-header { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--brand-dark); margin-bottom: 12px; }
    .sys-header i { width: 16px; height: 16px; }
    .trade-box {
      background: var(--white);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 12px;
    }
    .tb-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .tb-row:last-child { margin-bottom: 0; }
    .tb-dir { font-size: 12px; font-weight: 600; color: var(--text-tertiary); width: 40px; text-align: right; }
    .tb-item { display: flex; align-items: center; gap: 8px; flex: 1; font-size: 14px; font-weight: 600; color: var(--text); }
    .tb-item img { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; }
    .tb-item-icon { width: 32px; height: 32px; border-radius: 4px; background: var(--bg); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
    .tb-cash { font-size: 13px; font-weight: 600; color: var(--green); }

    .sys-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

    /* Input area */
    .chat-input-area {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 16px 32px;
    }
    .chat-form {
      display: flex; gap: 12px;
    }
    .chat-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 12px 20px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    .chat-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-glow); }
    .chat-send {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--brand);
      color: white;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chat-send:hover { background: var(--brand-dark); transform: scale(1.05); }

    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white); border-radius: var(--radius-lg); width: 440px; max-width: 90%;
      padding: 24px; position: relative; box-shadow: var(--shadow-lg);
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }

    @media (max-width: 768px) {
      .messages-layout { grid-template-columns: 1fr; height: 100vh; }
      .chat-sidebar { display: flex; }
      .chat-main { display: none; position: fixed; inset: 0; z-index: 200; height: 100vh; }
      .chat-main.active { display: flex; }
      .chat-header-main { padding: 12px 16px; }
      .chat-messages { padding: 16px; }
      .chat-input-area { padding: 12px 16px; }
      .mobile-back { display: block; border: none; background: transparent; font-size: 20px; margin-right: 12px; }
    }
    .mobile-back { display: none; }
    @media (min-width: 769px) { .mobile-back { display: none !important; } }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="browse.html" class="logo">HobbieTrades</a>
  <div class="nav-links" style="margin-left:auto">
    <a href="browse.html"        class="nav-link">Browse</a>
    <a href="for-you.html"       class="nav-link">For You</a>
    <a href="messages.html"      class="nav-link active">Messages</a>
    <a href="create-listing.html" class="nav-link">+ List Item</a>
    <a href="profile.html"       class="nav-avatar" id="nav-avatar">?</a>
  </div>
</nav>

<div class="messages-layout">
  
  <aside class="chat-sidebar" id="sidebar">
    <div class="chat-sidebar-header">
      <div class="chat-sidebar-title"><i data-feather="message-square"></i> Messages</div>
    </div>
    <div class="chat-list" id="chat-list">
      <div class="sidebar-empty">
        <i data-feather="loader" class="spinner"></i>
        Loading...
      </div>
    </div>
  </aside>

  <main class="chat-main" id="chat-main">
    <div class="chat-empty" id="chat-empty">
      <i data-feather="message-circle"></i>
      <div>Select a conversation to start trading</div>
    </div>

    <div id="chat-active" style="display:none; flex-direction:column; height:100%">
      <div class="chat-header-main">
        <div style="display:flex;align-items:center">
          <button class="mobile-back" onclick="closeMobileChat()"><i data-feather="arrow-left"></i></button>
          <a href="#" class="chat-target-user" id="chat-target-link">
            <div class="chat-target-ava" id="chat-target-ava">?</div>
            <div>
              <div class="chat-target-name" id="chat-target-name">...</div>
              <div class="chat-target-meta">
                <i data-feather="star"></i> <span id="chat-target-rating">0.0</span>
              </div>
            </div>
          </a>
        </div>
        <div class="chat-actions" id="chat-header-actions">
          <!-- Propose/Review buttons go here -->
        </div>
      </div>

      <div class="chat-messages" id="chat-messages"></div>

      <div class="chat-input-area">
        <form class="chat-form" onsubmit="event.preventDefault(); sendMessage();">
          <input type="text" class="chat-input" id="msg-input" placeholder="Type a message..." autocomplete="off"/>
          <button type="submit" class="chat-send"><i data-feather="send"></i></button>
        </form>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="status-modal">
  <div class="modal">
    <div class="modal-title" id="sm-title">Confirm</div>
    <div class="modal-desc" id="sm-desc">Are you sure?</div>
    <div style="display:flex;gap:12px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeStatusModal()">Cancel</button>
      <button class="btn btn-primary" id="sm-btn" onclick="execStatusAction()">Confirm</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  feather.replace();

  const API = window.HobbieAPI ? window.HobbieAPI.baseUrl : (
    window.location.hostname.includes('localhost') || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:8080'
      : 'https://hobbietrades-backend.onrender.com'
  );
  if (window.HobbieAPI) window.HobbieAPI.wakeBackend();

  const loggedInUserId = parseInt(localStorage.getItem('userId'), 10);
  if (!loggedInUserId) window.location.href = 'index.html';

  document.getElementById('nav-avatar').textContent = (localStorage.getItem('userName') || '?').charAt(0).toUpperCase();

  const AVATAR_COLORS = ['#AFA9EC','#9FE1CB','#F5C4B3','#85B7EB','#F7D08A','#B5EAD7','#C7CEEA'];
  function colorFor(id) { return AVATAR_COLORS[(id||0) % AVATAR_COLORS.length]; }
  function getInitials(n) { return (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
  function formatPeso(v) { return '₱' + Number(v||0).toLocaleString('en-PH'); }
  function escapeHtml(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }

  let allTrades = [];
  let activeTrade = null;
  let pendingTargetItemId = null;

  function getOtherUser(trade) {
    return trade.proposer.id === loggedInUserId ? trade.receiver : trade.proposer;
  }

  function isProposer(trade) {
    return trade.proposer.id === loggedInUserId;
  }

  function formatMsgTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString() === new Date().toLocaleDateString()
      ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      : d.toLocaleDateString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  /** Trade lifecycle updates — not user-typed chat. */
  function isSystemMessage(m) {
    if (m.system || m.isSystem) return true;
    const c = m.content || '';
    return /^Trade accepted by /.test(c)
      || / confirmed meetup completion\. Waiting for /.test(c)
      || c === 'Trade completed. Both traders confirmed the meetup.';
  }

  function renderSystemMessage(m) {
    return `
      <div class="msg-sys-event">
        <div class="msg-sys-event-inner">
          <i data-feather="bell"></i>
          <span>${escapeHtml(m.content)}</span>
        </div>
        <div class="msg-sys-event-time">${formatMsgTime(m.sentAt)}</div>
      </div>`;
  }

  function statusClass(status) {
    const s = (status || '').toLowerCase();
    if (s === 'pending') return 'status-pending';
    if (s === 'accepted') return 'status-accepted';
    if (s === 'completed') return 'status-completed';
    if (s === 'declined') return 'status-declined';
    return 'status-accepted';
  }

  async function loadTrades() {
    try {
      const res = await fetch(`${API}/api/trades/user/${loggedInUserId}`);
      if (!res.ok) throw new Error();
      allTrades = await res.json();
      allTrades.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      renderSidebar();

      const urlParams = new URLSearchParams(window.location.search);
      const tradeId = urlParams.get('tradeId');
      const userId = urlParams.get('userId');
      pendingTargetItemId = urlParams.get('targetItemId');

      if (tradeId) {
        openTrade(parseInt(tradeId, 10));
      } else if (userId) {
        const uid = parseInt(userId, 10);
        const match = allTrades.find(t => getOtherUser(t).id === uid);
        if (match) openTrade(match.id);
        else openUserWithoutTrade(uid);
      }
    } catch (e) {
      document.getElementById('chat-list').innerHTML = `
        <div class="sidebar-empty">
          <i data-feather="alert-triangle"></i>
          <div>Could not load messages.</div>
        </div>`;
      feather.replace();
    }
  }

  function renderSidebar() {
    const list = document.getElementById('chat-list');
    if (allTrades.length === 0) {
      list.innerHTML = `
        <div class="sidebar-empty">
          <i data-feather="inbox"></i>
          <div>No trade conversations yet.<br/>Propose a trade to start messaging.</div>
        </div>`;
      feather.replace();
      return;
    }

    list.innerHTML = allTrades.map(t => {
      const other = getOtherUser(t);
      const isActive = activeTrade && activeTrade.id === t.id;
      const preview = `${t.offeredItem?.title || 'Item'} ↔ ${t.requestedItem?.title || 'Item'}`;
      const time = formatMsgTime(t.createdAt);

      return `
        <div class="chat-item ${isActive ? 'active' : ''}" onclick="openTrade(${t.id})">
          <div class="chat-ava" style="background:${colorFor(other.id)}">${getInitials(other.name)}</div>
          <div class="chat-info">
            <div class="chat-header">
              <span class="chat-name">${escapeHtml(other.name)}</span>
              <span class="chat-time">${time}</span>
            </div>
            <div class="chat-preview">${escapeHtml(preview)}</div>
            <div class="status-pill ${statusClass(t.status)}">${(t.status || '').toUpperCase()}</div>
          </div>
        </div>`;
    }).join('');
    feather.replace();
  }

  function setChatInputEnabled(enabled) {
    document.getElementById('msg-input').disabled = !enabled;
    document.getElementById('msg-input').placeholder = enabled
      ? 'Type a message...'
      : 'Propose a trade first to start messaging';
  }

  function setTargetUserUI(user) {
    if (!user) return;
    document.getElementById('chat-target-link').href = `profile.html?id=${user.id}`;
    document.getElementById('chat-target-name').textContent = escapeHtml(user.name);
    document.getElementById('chat-target-ava').textContent = getInitials(user.name);
    document.getElementById('chat-target-ava').style.background = colorFor(user.id);
    document.getElementById('chat-target-rating').textContent = (parseFloat(user.rating) || 0).toFixed(1);
  }

  async function openUserWithoutTrade(userId) {
    activeTrade = null;
    renderSidebar();

    document.getElementById('chat-empty').style.display = 'none';
    document.getElementById('chat-active').style.display = 'flex';
    if (window.innerWidth <= 768) {
      document.getElementById('chat-main').classList.add('active');
    }

    setChatInputEnabled(false);

    let user = null;
    try {
      const res = await fetch(`${API}/api/users/${userId}/profile`);
      if (res.ok) {
        const data = await res.json();
        if (data.success) user = data.user;
      }
    } catch (e) {}

    if (user) setTargetUserUI(user);

    const proposeUrl = pendingTargetItemId
      ? `propose-trade.html?targetItemId=${pendingTargetItemId}`
      : `propose-trade.html?targetUserId=${userId}`;

    document.getElementById('chat-header-actions').innerHTML =
      `<a href="${proposeUrl}" class="btn btn-primary btn-sm"><i data-feather="refresh-cw"></i> Propose Trade</a>`;

    document.getElementById('chat-messages').innerHTML = `
      <div style="text-align:center;padding:48px 24px;color:var(--text-secondary);max-width:420px;margin:0 auto">
        <i data-feather="message-circle" style="width:40px;height:40px;margin-bottom:16px;color:var(--border)"></i>
        <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">No trade yet</div>
        <div style="font-size:14px;line-height:1.6;margin-bottom:20px">
          Messaging opens once a trade is proposed. Send a trade offer first, then coordinate meetup details here.
        </div>
        <a href="${proposeUrl}" class="btn btn-primary">Propose a Trade</a>
      </div>`;
    feather.replace();
  }

  async function openTrade(tradeId) {
    activeTrade = allTrades.find(t => t.id === tradeId);
    if (!activeTrade) return;

    renderSidebar();

    document.getElementById('chat-empty').style.display = 'none';
    document.getElementById('chat-active').style.display = 'flex';
    if (window.innerWidth <= 768) {
      document.getElementById('chat-main').classList.add('active');
    }

    setTargetUserUI(getOtherUser(activeTrade));
    updateHeaderActions();
    setChatInputEnabled(true);
    await loadMessages();
  }

  function closeMobileChat() {
    document.getElementById('chat-main').classList.remove('active');
  }

  function updateHeaderActions() {
    const act = document.getElementById('chat-header-actions');
    if (!activeTrade) return;

    const st = (activeTrade.status || '').toLowerCase();
    const other = getOtherUser(activeTrade);
    const proposeUrl = activeTrade.requestedItem
      ? `propose-trade.html?targetItemId=${activeTrade.requestedItem.id}`
      : `propose-trade.html?targetUserId=${other.id}`;

    if (st === 'completed') {
      act.innerHTML = `<a href="review.html?tradeId=${activeTrade.id}" class="btn btn-outline btn-sm"><i data-feather="star"></i> Leave Review</a>`;
    } else if (st === 'declined') {
      act.innerHTML = `<a href="${proposeUrl}" class="btn btn-outline btn-sm">Propose Again</a>`;
    } else {
      act.innerHTML = `<a href="${proposeUrl}" class="btn btn-outline btn-sm">View Items</a>`;
    }
    feather.replace();
  }

  function renderItemThumb(item) {
    if (!item) return `<div class="tb-item"><div class="tb-item-icon"><i data-feather="minus"></i></div><span>—</span></div>`;
    const url = window.HobbieAPI
      ? window.HobbieAPI.resolveImageUrl(item.photoUrl, item.id)
      : (item.photoUrl ? `${API}${item.photoUrl}` : `${API}/api/items/${item.id}/photo`);
    return `
      <div class="tb-item">
        ${url ? `<img src="${url}" alt="" onerror="this.style.display='none'"/>` : `<div class="tb-item-icon"><i data-feather="box"></i></div>`}
        <span>${escapeHtml(item.title)}</span>
      </div>`;
  }

  function renderTradePanel() {
    if (!activeTrade) return '';

    const proposer = isProposer(activeTrade);
    const sendItem = proposer ? activeTrade.offeredItem : activeTrade.requestedItem;
    const getItem = proposer ? activeTrade.requestedItem : activeTrade.offeredItem;
    const st = (activeTrade.status || '').toLowerCase();

    let actions = '';
    if (st === 'pending') {
      if (!proposer) {
        actions = `
          <button class="btn btn-outline btn-sm" onclick="promptAction('decline')">Decline</button>
          <button class="btn btn-primary btn-sm" onclick="promptAction('accept')">Accept Trade</button>`;
      } else {
        actions = `<button class="btn btn-outline btn-sm" onclick="promptAction('decline')">Cancel Proposal</button>`;
      }
    } else if (st === 'accepted') {
      const myConfirmed = proposer ? activeTrade.proposerConfirmed : activeTrade.receiverConfirmed;
      if (!myConfirmed) {
        actions = `<button class="btn btn-primary btn-sm" onclick="promptAction('confirm')">Confirm Meetup Complete</button>`;
      } else {
        actions = `<span style="font-size:13px;color:var(--text-secondary)">Waiting for the other trader to confirm.</span>`;
      }
    } else if (st === 'completed') {
      actions = `<a href="review.html?tradeId=${activeTrade.id}" class="btn btn-outline btn-sm">Leave a Review</a>`;
    }

    return `
      <div class="msg-sys">
        <div class="sys-header"><i data-feather="refresh-cw"></i> Trade #${activeTrade.id} · ${(activeTrade.status || '').toUpperCase()}</div>
        <div class="trade-box">
          <div class="tb-row"><div class="tb-dir">Send</div>${renderItemThumb(sendItem)}</div>
          <div class="tb-row"><div class="tb-dir">Get</div>${renderItemThumb(getItem)}</div>
        </div>
        ${actions ? `<div class="sys-actions">${actions}</div>` : ''}
      </div>`;
  }

  async function loadMessages() {
    const box = document.getElementById('chat-messages');
    box.innerHTML = `<div style="text-align:center;padding:20px"><span class="spinner"></span></div>`;

    if (!activeTrade) return;

    try {
      const res = await fetch(`${API}/api/messages/trade/${activeTrade.id}`);
      if (!res.ok) throw new Error();
      const msgs = await res.json();

      let html = renderTradePanel();

      if (msgs.length === 0) {
        html += `<div style="text-align:center;padding:24px;color:var(--text-tertiary);font-size:14px">Say hello and coordinate your meetup.</div>`;
      } else {
        html += msgs.map(m => {
          if (isSystemMessage(m)) return renderSystemMessage(m);
          const isMe = m.sender && m.sender.id === loggedInUserId;
          return `
            <div class="msg-row ${isMe ? 'me' : ''}">
              <div class="msg-ava" style="background:${colorFor(m.sender.id)}">${getInitials(m.sender.name)}</div>
              <div>
                <div class="msg-bubble">${escapeHtml(m.content)}</div>
                <div class="msg-time">${formatMsgTime(m.sentAt)}</div>
              </div>
            </div>`;
        }).join('');
      }

      box.innerHTML = html;
      feather.replace();
      box.scrollTop = box.scrollHeight;
    } catch (e) {
      box.innerHTML = `<div style="text-align:center;padding:20px;color:var(--red)">Failed to load messages</div>`;
    }
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const txt = input.value.trim();
    if (!txt || !activeTrade) return;

    input.value = '';

    try {
      const res = await fetch(`${API}/api/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          tradeId: activeTrade.id,
          senderId: loggedInUserId,
          content: txt
        })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.success) throw new Error();
      await loadMessages();
    } catch (e) {
      input.value = txt;
    }
  }

  let pendingAction = null;

  function promptAction(action) {
    pendingAction = action;
    const modal = document.getElementById('status-modal');
    const title = document.getElementById('sm-title');
    const desc = document.getElementById('sm-desc');
    const btn = document.getElementById('sm-btn');

    if (action === 'accept') {
      title.textContent = 'Accept Trade?';
      desc.textContent = 'You agree to swap items. Coordinate meetup details in the chat.';
      btn.textContent = 'Accept Trade';
      btn.className = 'btn btn-primary';
    } else if (action === 'decline') {
      title.textContent = 'Decline Trade?';
      desc.textContent = 'This will cancel the proposal. You can propose a different trade later.';
      btn.textContent = 'Decline Trade';
      btn.className = 'btn btn-danger';
    } else if (action === 'confirm') {
      title.textContent = 'Confirm Meetup Complete?';
      desc.textContent = 'Only confirm after you have exchanged items in person. The other trader must confirm too.';
      btn.textContent = 'Confirm Complete';
      btn.className = 'btn btn-primary';
    }

    modal.classList.add('open');
  }

  function closeStatusModal() {
    document.getElementById('status-modal').classList.remove('open');
    pendingAction = null;
  }

  async function execStatusAction() {
    if (!pendingAction || !activeTrade) return;
    const btn = document.getElementById('sm-btn');
    btn.disabled = true;

    try {
      let url = '';
      if (pendingAction === 'accept') url = `${API}/api/trades/${activeTrade.id}/accept`;
      else if (pendingAction === 'decline') url = `${API}/api/trades/${activeTrade.id}/decline`;
      else if (pendingAction === 'confirm') url = `${API}/api/trades/${activeTrade.id}/confirm`;

      const res = await fetch(url, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: loggedInUserId })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.success) throw new Error(data.message || 'Failed');

      closeStatusModal();
      const tradeId = activeTrade.id;
      await loadTrades();
      await openTrade(tradeId);
    } catch (e) {
      alert(e.message || 'Action failed');
    } finally {
      btn.disabled = false;
    }
  }

  loadTrades();
</script>
</body>
</html>
