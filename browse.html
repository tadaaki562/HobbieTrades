<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HobbieTrades — Browse</title>
  <link rel="stylesheet" href="style.css"/>
  <!-- Feather Icons for clean minimal SVGs -->
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    /* ── HERO ── */
    .browse-hero {
      background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand) 100%);
      padding: 56px 40px 84px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .browse-hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 250px; height: 250px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    .browse-hero::after {
      content: '';
      position: absolute;
      bottom: -60px; left: 30%;
      width: 300px; height: 300px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .hero-inner h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
      color: white;
    }
    .hero-inner p { color: rgba(255,255,255,0.85); font-size: 16px; font-weight: 500; }

    /* ── SEARCH FLOAT ── */
    .search-float-wrap {
      max-width: 1200px;
      margin: -28px auto 0;
      padding: 0 40px;
      position: relative;
      z-index: 10;
    }
    .search-float {
      background: var(--white);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1px solid var(--border);
    }
    .search-float i { color: var(--text-tertiary); }
    .search-float input {
      flex: 1;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      background: transparent;
    }
    .search-float input::placeholder { color: var(--text-tertiary); }

    /* ── CATEGORY SCROLL ── */
    .cat-scroll-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 40px 0;
    }
    .cat-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      white-space: nowrap;
      flex-shrink: 0;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 14px;
    }
    .cat-tab i { width: 16px; height: 16px; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .cat-tab:hover { 
      border-color: var(--brand-mid); 
      color: var(--brand);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
    }
    .cat-tab:hover i { transform: scale(1.15); }
    .cat-tab.active { 
      background: var(--brand); 
      border-color: var(--brand); 
      color: white; 
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
    }

    /* ── PAGE LAYOUT ── */
    .browse-layout {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 40px 40px;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 32px;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 24px;
      position: sticky;
      top: 88px;
    }
    .sidebar-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-title i { width: 18px; height: 18px; color: var(--text-secondary); }
    .filter-section { margin-bottom: 24px; }
    .filter-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    /* Category pills in sidebar */
    .sb-cat {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      margin-bottom: 4px;
      transition: all 0.2s;
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .sb-cat:hover { background: var(--bg); color: var(--text); }
    .sb-cat.active { background: var(--brand-light); color: var(--brand-dark); font-weight: 600; }
    .sb-cat .sc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sb-cat .sc-count {
      margin-left: auto;
      font-size: 12px;
      background: var(--border-light);
      padding: 2px 8px;
      border-radius: 20px;
      color: var(--text-secondary);
    }
    .sb-cat.active .sc-count { background: var(--brand-mid); color: white; }

    /* Range inputs */
    .range-row { display: flex; gap: 8px; align-items: center; }
    .range-inp {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      outline: none;
      background: var(--bg);
      transition: all 0.2s;
      width: 100%;
    }
    .range-inp:focus { border-color: var(--brand); background: var(--white); box-shadow: 0 0 0 2px var(--brand-glow); }
    .range-sep { color: var(--text-tertiary); font-size: 14px; flex-shrink: 0; }

    /* Condition chips */
    .cond-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .cond-chip {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-secondary);
      background: var(--white);
    }
    .cond-chip:hover {
      background: var(--bg);
    }
    .cond-chip.active {
      border-color: var(--brand);
      background: var(--brand);
      color: white;
    }

    .apply-btn {
      width: 100%;
      background: var(--brand);
      color: white;
      border: none;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .apply-btn:hover { background: var(--brand-dark); }

    /* ── MAIN CONTENT ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .result-count { font-size: 15px; color: var(--text-secondary); }
    .result-count strong { color: var(--text); font-weight: 600; }

    .sort-select {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--white);
      outline: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sort-select:focus { border-color: var(--brand); box-shadow: 0 0 0 2px var(--brand-glow); }

    /* ── ITEM GRID ── */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 24px;
    }

    /* ── ITEM CARD ── */
    .item-card {
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: var(--border-light);
    }

    .card-img {
      position: relative;
      padding-top: 75%;
      background: var(--bg);
      overflow: hidden;
    }
    .card-img img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .item-card:hover .card-img img { transform: scale(1.04); }

    .card-placeholder-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
    }
    .card-placeholder-icon i { width: 48px; height: 48px; }

    .card-trade-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: var(--white);
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 0.05em;
      box-shadow: var(--shadow-sm);
    }

    .card-match-badge {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      max-width: calc(100% - 24px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: var(--shadow-sm);
    }
    .card-match-badge.high { background: var(--green-light); color: var(--green); }
    .card-match-badge.med  { background: var(--brand-light); color: var(--brand-dark); }
    .card-match-badge.low  { background: var(--white); color: var(--text-secondary); }

    .card-match-reason {
      font-size: 12px;
      color: var(--brand-dark);
      margin-top: 8px;
      line-height: 1.4;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .card-match-reason i { width: 14px; height: 14px; flex-shrink: 0; margin-top: 2px; }

    /* Condition badge on card */
    .card-cond-badge {
      position: absolute;
      top: 12px; right: 12px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      box-shadow: var(--shadow-sm);
      background: var(--white);
      color: var(--text-secondary);
    }

    .card-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card-category {
      font-size: 12px;
      font-weight: 600;
      color: var(--brand);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-meta .cdot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .card-location { 
      font-size: 13px; 
      color: var(--text-tertiary); 
      display: flex; 
      align-items: center; 
      gap: 6px; 
    }
    .card-location i { width: 14px; height: 14px; }

    .card-footer {
      padding: 16px;
      border-top: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
    }
    .card-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .card-value span { font-size: 12px; font-weight: 500; color: var(--text-secondary); }

    .trade-btn-sm {
      background: var(--brand);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .trade-btn-sm:hover { background: var(--brand-dark); transform: translateY(-1px); }

    /* ── SKELETON ── */
    .skeleton-card { background: var(--white); border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; }
    .skel { background: linear-gradient(90deg, var(--border-light) 25%, var(--border) 50%, var(--border-light) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    .skel-img { height: 180px; }
    .skel-body { padding: 16px; }
    .skel-line { height: 12px; border-radius: 6px; margin-bottom: 10px; }
    .skel-w80 { width: 80%; }
    .skel-w55 { width: 55%; }
    .skel-w40 { width: 40%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 24px;
      color: var(--text-secondary);
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1px dashed var(--border);
    }
    .empty-icon { color: var(--text-tertiary); margin-bottom: 16px; display: flex; justify-content: center; }
    .empty-icon i { width: 48px; height: 48px; }
    .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }

    /* ── PAGINATION ── */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 40px;
      flex-wrap: wrap;
    }
    .page-btn {
      width: 40px; height: 40px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--white);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover { border-color: var(--text-tertiary); color: var(--text); background: var(--bg); }
    .page-btn.active { background: var(--brand); border-color: var(--brand); color: white; font-weight: 600; }

    @media (max-width: 960px) {
      .browse-layout {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 0 16px 24px;
        margin: 16px auto 0;
      }
      .sidebar { position: static; order: 2; padding: 20px; }
      main { order: 1; min-width: 0; }
      .browse-hero { padding: 40px 20px; }
      .hero-inner h1 { font-size: 26px; }
      .search-float-wrap { padding: 0 16px; margin-top: -24px; }
      .search-float { flex-wrap: wrap; gap: 12px; padding: 12px 16px; }
      .search-float input { min-width: 0; }
      .cat-scroll-wrap { padding: 16px 16px 0; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .sort-select { width: 100%; }
      .item-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    }

    @media (max-width: 480px) {
      .item-grid { grid-template-columns: 1fr; }
      .card-footer { flex-direction: column; gap: 12px; align-items: stretch; }
      .trade-btn-sm { width: 100%; text-align: center; padding: 10px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="navbar">
  <a href="browse.html" class="logo">HobbieTrades</a>
  <div class="nav-search">
    <i data-feather="search" class="search-icon"></i>
    <input type="text" id="nav-search-input" placeholder="Search items to trade..." oninput="syncSearch(this)"/>
  </div>
  <div class="nav-links">
    <a href="browse.html"        class="nav-link active">Browse</a>
    <a href="for-you.html"       class="nav-link">For You</a>
    <a href="messages.html"      class="nav-link">Messages</a>
    <a href="create-listing.html" class="nav-link">+ List Item</a>
    <a href="profile.html"       class="nav-avatar" id="nav-avatar">?</a>
  </div>
</nav>

<!-- HERO -->
<div class="browse-hero">
  <div class="hero-inner">
    <h1>Browse Listings</h1>
    <p>Zero cash. Pure barter. Find your perfect hobby swap.</p>
  </div>
</div>

<!-- SEARCH BAR (floating) -->
<div class="search-float-wrap">
  <div class="search-float">
    <i data-feather="search"></i>
    <input type="text" id="search-input" placeholder="Search cameras, guitars, pianos, drums…" oninput="syncSearch(this)"/>
    <button class="btn btn-primary btn-sm" onclick="applyFilters()">Search</button>
  </div>
</div>

<!-- CATEGORY QUICK TABS -->
<div class="cat-scroll-wrap">
  <div class="cat-scroll" id="cat-scroll">
    <div class="cat-tab active" data-cat="all" onclick="selectCatTab(this,'all')">
      <i data-feather="grid"></i> All
    </div>
    <div class="cat-tab" data-cat="Cameras" onclick="selectCatTab(this,'Cameras')">
      <i data-feather="camera"></i> Cameras
    </div>
    <div class="cat-tab" data-cat="Instruments" onclick="selectCatTab(this,'Instruments')">
      <i data-feather="music"></i> Instruments
    </div>
  </div>
</div>

<!-- LAYOUT -->
<div class="browse-layout page-enter">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title"><i data-feather="sliders"></i> Filters</div>

    <div class="filter-section">
      <div class="filter-label">Category</div>
      <div class="sb-cat active" data-cat="all" onclick="selectSbCat(this,'all')">
        <span class="sc-dot" style="background:var(--brand)"></span> All Categories
        <span class="sc-count" id="cnt-all">0</span>
      </div>
      <div class="sb-cat" data-cat="Cameras" onclick="selectSbCat(this,'Cameras')">
        <span class="sc-dot" style="background:var(--brand-dark)"></span> Cameras
        <span class="sc-count" id="cnt-Cameras">0</span>
      </div>
      <div class="sb-cat" data-cat="Instruments" onclick="selectSbCat(this,'Instruments')">
        <span class="sc-dot" style="background:var(--brand-mid)"></span> Instruments
        <span class="sc-count" id="cnt-Instruments">0</span>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Estimated Value (₱)</div>
      <div class="range-row">
        <input class="range-inp" type="number" id="min-val" placeholder="Min" min="0"/>
        <span class="range-sep">–</span>
        <input class="range-inp" type="number" id="max-val" placeholder="Max" min="0"/>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Condition</div>
      <div class="cond-chips">
        <div class="cond-chip active" data-cond="all"      onclick="selectCond(this,'all')">All</div>
        <div class="cond-chip"        data-cond="Like New" onclick="selectCond(this,'Like New')">Like New</div>
        <div class="cond-chip"        data-cond="Good"     onclick="selectCond(this,'Good')">Good</div>
        <div class="cond-chip"        data-cond="Fair"     onclick="selectCond(this,'Fair')">Fair</div>
        <div class="cond-chip"        data-cond="Worn"     onclick="selectCond(this,'Worn')">Worn</div>
      </div>
    </div>

    <button class="apply-btn" onclick="applyFilters()">Apply Filters</button>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="toolbar">
      <div class="result-count" id="result-count">Loading items…</div>
      <select class="sort-select" id="sort-select" onchange="applyFilters()">
        <option value="newest">Newest First</option>
        <option value="match-best">Best match for you</option>
        <option value="value-high">Value: High to Low</option>
        <option value="value-low">Value: Low to High</option>
        <option value="name-az">Name A–Z</option>
      </select>
    </div>

    <!-- Skeleton while loading -->
    <div class="item-grid" id="item-grid"></div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<script src="js/api.js"></script>
<script>
  feather.replace();

  const API = window.HobbieAPI ? window.HobbieAPI.baseUrl : (
    window.location.hostname.includes('localhost') || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:8080'
      : 'https://hobbietrades-backend.onrender.com'
  );
  if (window.HobbieAPI) window.HobbieAPI.wakeBackend();

  // ─── Constants ───────────────────────────────────────────────────────────────
  const ITEMS_PER_PAGE = 12;
  const CAT_ICON = { Cameras:'camera', Instruments:'music', Other:'box' };
  const COND_COLOR = { 'Like New':'var(--green)', 'Good':'var(--brand)', 'Fair':'var(--orange)', 'Worn':'var(--red)' };

  // ─── State ───────────────────────────────────────────────────────────────────
  let allItems    = [];
  let filtered    = [];
  let currentPage = 1;
  let activeCat   = 'all';
  let activeCond  = 'all';
  let matchByItemId = {};
  const loggedInUserId = parseInt(localStorage.getItem('userId') || '', 10) || null;

  // ─── Init ────────────────────────────────────────────────────────────────────
  document.getElementById('nav-avatar').textContent =
    (localStorage.getItem('userName') || '?').charAt(0).toUpperCase();

  function skeletonHtml(count) {
    return Array(count).fill(`
      <div class="skeleton-card">
        <div class="skel skel-img"></div>
        <div class="skel-body">
          <div class="skel skel-line skel-w40" style="margin-bottom:8px"></div>
          <div class="skel skel-line skel-w80"></div>
          <div class="skel skel-line skel-w55"></div>
        </div>
      </div>`).join('');
  }

  function getSearchQuery() {
    return ((document.getElementById('search-input').value || '').trim() ||
      (document.getElementById('nav-search-input').value || '').trim()).toLowerCase();
  }

  // ─── Helpers ─────────────────────────────────────────────────────────────────
  function formatPeso(v)   { return '₱' + Number(v||0).toLocaleString('en-PH'); }

  function escapeHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/"/g, '&quot;');
  }

  async function loadMatchHints() {
    matchByItemId = {};
    if (!loggedInUserId) return;
    try {
      const res = await fetch(`${API}/api/trades/matches?userId=${loggedInUserId}&limit=60`);
      if (!res.ok) return;
      const matches = await res.json();
      matches.forEach(m => {
        if (m.item && m.item.id != null) {
          matchByItemId[m.item.id] = {
            pct: m.matchPercent != null ? m.matchPercent : (m.matchScore || 0),
            reason: m.matchReason || ''
          };
        }
      });
    } catch (_) { /* optional */ }
  }

  // ─── Load items from API ──────────────────────────────────────────────────────
  async function loadItems() {
    try {
      const res = await fetch(`${API}/api/items`);
      if (!res.ok) throw new Error('Server error');
      allItems = await res.json();
      await loadMatchHints();
      updateCounts();
      applyFilters();
    } catch(e) {
      document.getElementById('item-grid').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><i data-feather="alert-triangle"></i></div>
          <h3>Could not connect</h3>
          <p>Make sure your server is running.</p>
        </div>`;
      feather.replace();
      document.getElementById('result-count').textContent = '';
    }
  }

  function updateCounts() {
    const cats = ['Cameras','Instruments'];
    cats.forEach(c => {
      const el = document.getElementById('cnt-' + c);
      if (el) el.textContent = allItems.filter(i => i.category === c).length;
    });
    const allEl = document.getElementById('cnt-all');
    if (allEl) allEl.textContent = allItems.length;
  }

  // ─── Filter + sort ────────────────────────────────────────────────────────────
  function applyFilters() {
    const q    = getSearchQuery();
    const minV = parseFloat(document.getElementById('min-val').value) || 0;
    const maxV = parseFloat(document.getElementById('max-val').value) || Infinity;
    const sort = document.getElementById('sort-select').value;

    filtered = allItems.filter(item => {
      if (activeCat !== 'all' && item.category !== activeCat) return false;
      if (activeCond !== 'all' && item.conditionLabel !== activeCond) return false;
      if (q && !item.title?.toLowerCase().includes(q) && !item.description?.toLowerCase().includes(q)) return false;
      const v = parseFloat(item.estimatedValue) || 0;
      if (v < minV || v > maxV) return false;
      return true;
    });

    if      (sort === 'value-high') filtered.sort((a,b) => (parseFloat(b.estimatedValue)||0) - (parseFloat(a.estimatedValue)||0));
    else if (sort === 'value-low')  filtered.sort((a,b) => (parseFloat(a.estimatedValue)||0) - (parseFloat(b.estimatedValue)||0));
    else if (sort === 'name-az')    filtered.sort((a,b) => (a.title||'').localeCompare(b.title||''));
    else if (sort === 'match-best') {
      filtered.sort((a, b) => {
        const ma = matchByItemId[a.id]?.pct ?? -1;
        const mb = matchByItemId[b.id]?.pct ?? -1;
        if (mb !== ma) return mb - ma;
        return b.id - a.id;
      });
    }
    else                            filtered.sort((a,b) => b.id - a.id);

    currentPage = 1;
    renderPage();
  }

  // ─── Render page ──────────────────────────────────────────────────────────────
  function renderPage() {
    const start     = (currentPage - 1) * ITEMS_PER_PAGE;
    const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

    document.getElementById('result-count').innerHTML =
      `<strong>${filtered.length}</strong> item${filtered.length !== 1 ? 's' : ''} found`;

    const grid = document.getElementById('item-grid');

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><i data-feather="search"></i></div>
          <h3>No items found</h3>
          <p>Try adjusting your filters or search term.</p>
        </div>`;
      feather.replace();
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = pageItems.map((item, index) => {
      const icon    = CAT_ICON[item.category] || 'box';
      const cond    = item.conditionLabel || '';
      const val     = parseFloat(item.estimatedValue) || 0;

      const imgSrc = window.HobbieAPI
        ? window.HobbieAPI.resolveImageUrl(item.photoUrl, item.id)
        : (item.photoUrl
            ? `${API}${item.photoUrl}`
            : (item.id ? `${API}/api/items/${item.id}/photo` : null));

      const imgHtml = imgSrc
        ? `<img src="${imgSrc}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
           <div class="card-placeholder-icon" style="display:none"><i data-feather="${icon}"></i></div>`
        : `<div class="card-placeholder-icon"><i data-feather="${icon}"></i></div>`;

      const mh = matchByItemId[item.id];
      let matchBadgeHtml = '';
      if (loggedInUserId && mh && mh.pct >= 22) {
        const tier = mh.pct >= 70 ? 'high' : mh.pct >= 45 ? 'med' : 'low';
        const tip = escapeHtml((mh.reason || 'Rule-based match').replace(/"/g, "'"));
        matchBadgeHtml = `<div class="card-match-badge ${tier}" title="${tip}">${mh.pct}% Match</div>`;
      }
      const matchReasonHtml = (loggedInUserId && mh && mh.pct >= 22 && mh.reason)
        ? `<div class="card-match-reason"><i data-feather="target"></i> <span>${escapeHtml(mh.reason)}</span></div>`
        : '';

      const staggerClass = index < 10 ? `animate-slide-up stagger-${(index % 5) + 1}` : 'animate-slide-up';

      return `
        <a class="item-card ${staggerClass}" href="item-detail.html?id=${item.id}">
          <div class="card-img">
            ${imgHtml}
            <div class="card-trade-badge">TRADE</div>
            ${cond ? `<div class="card-cond-badge">${cond}</div>` : ''}
            ${matchBadgeHtml}
          </div>
          <div class="card-body">
            <div class="card-category">${item.category || 'General'}</div>
            <div class="card-title">${escapeHtml(item.title)}</div>
            <div class="card-meta">
              <span class="cdot" style="background:${COND_COLOR[cond] || 'var(--text-tertiary)'}"></span>${cond || 'Unknown Condition'}
            </div>
            ${item.lookingFor ? `<div class="card-location" style="color:var(--text);margin-top:4px"><i data-feather="refresh-cw"></i> Wants: ${escapeHtml(item.lookingFor)}</div>` : ''}
            <div class="card-location"><i data-feather="map-pin"></i> ${escapeHtml(item.location || 'Philippines')}</div>
            ${matchReasonHtml}
          </div>
          <div class="card-footer">
            <div class="card-value">${formatPeso(val)} <span>Value</span></div>
            <button class="trade-btn-sm" onclick="event.preventDefault();goTrade(${item.id})">Trade</button>
          </div>
        </a>`;
    }).join('');

    feather.replace();
    renderPagination();
  }

  // ─── Pagination ───────────────────────────────────────────────────────────────
  function renderPagination() {
    const total = Math.ceil(filtered.length / ITEMS_PER_PAGE);
    if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

    let html = '';
    if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage-1})"><i data-feather="chevron-left"></i></button>`;
    for (let i = 1; i <= total; i++) {
      if (i === 1 || i === total || Math.abs(i - currentPage) <= 1) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
      } else if (Math.abs(i - currentPage) === 2) {
        html += `<button class="page-btn" style="pointer-events:none;border:none;background:transparent">…</button>`;
      }
    }
    if (currentPage < total) html += `<button class="page-btn" onclick="goPage(${currentPage+1})"><i data-feather="chevron-right"></i></button>`;
    document.getElementById('pagination').innerHTML = html;
    feather.replace();
  }

  function goPage(n) {
    currentPage = n;
    renderPage();
    window.scrollTo({ top: 300, behavior: 'smooth' });
  }

  // ─── Category selection ───────────────────────────────────────────────────────
  function selectCatTab(el, cat) {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    activeCat = cat;
    document.querySelectorAll('.sb-cat').forEach(p => p.classList.toggle('active', p.dataset.cat === cat));
    applyFilters();
  }

  function selectSbCat(el, cat) {
    document.querySelectorAll('.sb-cat').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    activeCat = cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
    applyFilters();
  }

  // ─── Condition selection ──────────────────────────────────────────────────────
  function selectCond(el, cond) {
    document.querySelectorAll('.cond-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeCond = cond;
    applyFilters();
  }

  // ─── Search sync (both inputs stay in sync) ───────────────────────────────────
  function syncSearch(el) {
    const other = el.id === 'search-input'
      ? document.getElementById('nav-search-input')
      : document.getElementById('search-input');
    other.value = el.value;
    applyFilters();
  }

  // ─── Trade shortcut ───────────────────────────────────────────────────────────
  function goTrade(id) {
    const userId = localStorage.getItem('userId');
    if (!userId) { window.location.href = 'index.html'; return; }
    window.location.href = `item-detail.html?id=${id}`;
  }

  // Initialize initial skeleton and optional query from URL (?q=...)
  document.getElementById('item-grid').innerHTML = skeletonHtml(8);
  const initialQ = new URLSearchParams(window.location.search).get('q');
  if (initialQ) {
    document.getElementById('search-input').value = initialQ;
    document.getElementById('nav-search-input').value = initialQ;
  }

  loadItems();
</script>
</body>
</html>
