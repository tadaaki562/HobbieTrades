<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HobbieTrades — Browse</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── HERO ── */
    .browse-hero {
      background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand) 60%, var(--brand-mid) 100%);
      padding: 2.5rem 2rem;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .browse-hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 220px; height: 220px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    .browse-hero::after {
      content: '';
      position: absolute;
      bottom: -60px; left: 30%;
      width: 300px; height: 300px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .hero-inner h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      letter-spacing: 0;
    }
    .hero-inner p { color: rgba(255,255,255,0.75); font-size: 0.9rem; }

    /* ── SEARCH FLOAT ── */
    .search-float-wrap {
      max-width: 1200px;
      margin: -24px auto 0;
      padding: 0 2rem;
      position: relative;
      z-index: 10;
    }
    .search-float {
      background: var(--white);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1px solid var(--border);
    }
    .search-float input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: transparent;
    }
    .search-float input::placeholder { color: var(--text-tertiary); }

    /* ── CATEGORY SCROLL ── */
    .cat-scroll-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 2rem 0;
    }
    .cat-scroll {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 0.25rem;
    }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      padding: 0.65rem 1rem;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
      min-width: 72px;
      flex-shrink: 0;
      text-decoration: none;
    }
    .cat-tab:hover { border-color: var(--brand-mid); }
    .cat-tab.active { background: var(--brand); border-color: var(--brand); }
    .cat-tab .ct-emoji { font-size: 1.3rem; }
    .cat-tab .ct-name { font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); }
    .cat-tab.active .ct-name { color: rgba(255,255,255,0.9); }

    /* ── PAGE LAYOUT ── */
    .browse-layout {
      max-width: 1200px;
      margin: 1.5rem auto;
      padding: 0 2rem 2rem;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 1.25rem;
      position: sticky;
      top: 76px;
    }
    .sidebar-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.25rem;
    }
    .filter-section { margin-bottom: 1.25rem; }
    .filter-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.6rem;
    }

    /* Category pills in sidebar */
    .sb-cat {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      margin-bottom: 0.2rem;
      transition: all 0.15s;
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .sb-cat:hover { background: var(--brand-light); color: var(--brand); }
    .sb-cat.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }
    .sb-cat .sc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sb-cat .sc-count {
      margin-left: auto;
      font-size: 0.72rem;
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 20px;
      color: var(--text-tertiary);
    }
    .sb-cat.active .sc-count { background: var(--brand-mid); color: white; }

    /* Range inputs */
    .range-row { display: flex; gap: 0.5rem; align-items: center; }
    .range-inp {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.45rem 0.65rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--text);
      outline: none;
      background: var(--bg);
      transition: border-color 0.2s;
      width: 100%;
    }
    .range-inp:focus { border-color: var(--brand-mid); }
    .range-sep { color: var(--text-tertiary); font-size: 0.8rem; flex-shrink: 0; }

    /* Condition chips */
    .cond-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .cond-chip {
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-secondary);
      background: var(--white);
    }
    .cond-chip:hover, .cond-chip.active {
      border-color: var(--brand-mid);
      background: var(--brand-light);
      color: var(--brand);
    }

    .apply-btn {
      width: 100%;
      background: var(--brand);
      color: white;
      border: none;
      padding: 0.65rem;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .apply-btn:hover { background: var(--brand-dark); }

    /* ── MAIN CONTENT ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .result-count { font-size: 0.88rem; color: var(--text-secondary); }
    .result-count strong { color: var(--text); font-weight: 600; }

    .sort-select {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.4rem 0.75rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--text);
      background: var(--white);
      outline: none;
      cursor: pointer;
    }
    .sort-select:focus { border-color: var(--brand-mid); }

    /* ── ITEM GRID ── */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 1.1rem;
    }

    /* ── ITEM CARD ── */
    .item-card {
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    .item-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--brand-mid);
    }

    .card-img {
      position: relative;
      padding-top: 75%;
      background: var(--bg);
      overflow: hidden;
    }
    .card-img img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.35s ease;
    }
    .item-card:hover .card-img img { transform: scale(1.05); }

    .card-emoji-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .card-trade-badge {
      position: absolute;
      top: 8px; left: 8px;
      background: var(--brand);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 5px;
      letter-spacing: 0.04em;
    }

    .card-match-badge {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      max-width: calc(100% - 16px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-match-badge.high { background: #EAF3DE; color: #3B6D11; border: 1px solid #97C459; }
    .card-match-badge.med  { background: #EEF2FF; color: #4338CA; border: 1px solid #C7D2FE; }
    .card-match-badge.low  { background: rgba(255,255,255,0.92); color: #4B5563; border: 1px solid var(--border); }

    .card-match-reason {
      font-size: 0.68rem;
      color: var(--brand-dark);
      margin-top: 2px;
      line-height: 1.3;
    }

    /* Condition badge on card */
    .card-cond-badge {
      position: absolute;
      top: 8px; right: 8px;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 5px;
    }
    .cond-like-new { background: #EAF3DE; color: #3B6D11; }
    .cond-good     { background: #EEF2FF; color: #4F46E5; }
    .cond-fair     { background: #FEF3E2; color: #633806; }
    .cond-worn     { background: #FEE2E2; color: #7F1D1D; }

    .card-body {
      padding: 0.85rem 0.9rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .card-category {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--brand);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.1rem;
    }
    .card-location { font-size: 0.72rem; color: var(--text-tertiary); margin-top: 0.2rem; }

    .card-footer {
      padding: 0.65rem 0.9rem;
      border-top: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-value {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }
    .card-value span { font-size: 0.7rem; font-weight: 400; color: var(--text-secondary); font-family: 'DM Sans', sans-serif; }

    .trade-btn-sm {
      background: var(--brand);
      color: white;
      border: none;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .trade-btn-sm:hover { background: var(--brand-dark); }

    /* ── SKELETON ── */
    .skeleton-card { background: var(--white); border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; }
    .skel { background: linear-gradient(90deg, var(--bg) 25%, var(--border-light) 50%, var(--bg) 75%); background-size: 200% 100%; animation: shimmer 1.3s infinite; }
    .skel-img { height: 160px; }
    .skel-body { padding: 0.85rem 0.9rem; }
    .skel-line { height: 11px; border-radius: 6px; margin-bottom: 7px; }
    .skel-w80 { width: 80%; }
    .skel-w55 { width: 55%; }
    .skel-w40 { width: 40%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3.5rem 1.5rem;
      color: var(--text-secondary);
    }
    .empty-icon { font-size: 2.8rem; margin-bottom: 0.75rem; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; color: var(--text); margin-bottom: 0.4rem; }

    /* ── PAGINATION ── */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }
    .page-btn {
      width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover { border-color: var(--brand-mid); color: var(--brand); }
    .page-btn.active { background: var(--brand); border-color: var(--brand); color: white; font-weight: 600; }

    @media (max-width: 960px) {
      .browse-layout {
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 0 1rem 1.5rem;
        margin: 0.75rem auto 0;
      }
      .sidebar {
        position: static;
        order: 2;
        max-height: none;
      }
      main { order: 1; min-width: 0; }
      .browse-hero { padding: 1.5rem 1rem; }
      .hero-inner h1 { font-size: 1.5rem; }
      .search-float-wrap { padding: 0 1rem; margin-top: -16px; }
      .search-float { flex-wrap: wrap; gap: 0.5rem; }
      .search-float input { min-width: 0; }
      .cat-scroll-wrap { padding: 0.75rem 1rem 0; }
      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }
      .sort-select { width: 100%; }
      .item-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 0.85rem;
      }
    }

    @media (max-width: 480px) {
      .item-grid {
        grid-template-columns: 1fr;
      }
      .card-footer {
        flex-direction: column;
        gap: 0.5rem;
        align-items: stretch;
      }
      .trade-btn-sm { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="navbar">
  <a href="browse.html" class="logo"><span>Hobbie</span>Trades</a>
  <div class="nav-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="nav-search-input" placeholder="Search items to trade..." oninput="syncSearch(this)"/>
  </div>
  <div class="nav-links">
    <a href="browse.html"        class="nav-link active">Browse</a>
    <a href="for-you.html"       class="nav-link">✨ For You</a>
    <a href="messages.html"      class="nav-link">Messages</a>
    <a href="create-listing.html" class="nav-link">+ List Item</a>
    <a href="profile.html"       class="nav-avatar" id="nav-avatar">?</a>
  </div>
</nav>

<!-- HERO -->
<div class="browse-hero">
  <div class="hero-inner">
    <h1>Browse &amp; Trade ✦</h1>
    <p>Zero cash. Pure barter. Find your perfect hobby swap.</p>
  </div>
</div>

<!-- SEARCH BAR (floating) -->
<div class="search-float-wrap">
  <div class="search-float">
    <span style="font-size:1.1rem;color:var(--text-tertiary)">🔍</span>
    <input type="text" id="search-input" placeholder="Search guitars, cameras, gaming gear…" oninput="syncSearch(this)"/>
    <button class="btn btn-primary btn-sm" onclick="applyFilters()">Search</button>
  </div>
</div>

<!-- CATEGORY QUICK TABS -->
<div class="cat-scroll-wrap">
  <div class="cat-scroll" id="cat-scroll">
    <div class="cat-tab active" data-cat="all"         onclick="selectCatTab(this,'all')">         <span class="ct-emoji">🌐</span><span class="ct-name">All</span></div>
    <div class="cat-tab"        data-cat="Cameras"      onclick="selectCatTab(this,'Cameras')">      <span class="ct-emoji">📷</span><span class="ct-name">Cameras</span></div>
    <div class="cat-tab"        data-cat="Instruments"  onclick="selectCatTab(this,'Instruments')">  <span class="ct-emoji">🎸</span><span class="ct-name">Instruments</span></div>
  </div>
</div>

<!-- LAYOUT -->
<div class="browse-layout page-enter">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">🎛️ Filters</div>

    <div class="filter-section">
      <div class="filter-label">Category</div>
      <div class="sb-cat active" data-cat="all" onclick="selectSbCat(this,'all')">
        <span class="sc-dot" style="background:var(--brand)"></span> All Categories
        <span class="sc-count" id="cnt-all">0</span>
      </div>
      <div class="sb-cat" data-cat="Cameras"     onclick="selectSbCat(this,'Cameras')">
        <span class="sc-dot" style="background:#1D9E75"></span> Cameras
        <span class="sc-count" id="cnt-Cameras">0</span>
      </div>
      <div class="sb-cat" data-cat="Instruments" onclick="selectSbCat(this,'Instruments')">
        <span class="sc-dot" style="background:#D85A30"></span> Instruments
        <span class="sc-count" id="cnt-Instruments">0</span>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Estimated Value (₱)</div>
      <div class="range-row">
        <input class="range-inp" type="number" id="min-val" placeholder="Min" min="0"/>
        <span class="range-sep">–</span>
        <input class="range-inp" type="number" id="max-val" placeholder="Max" min="0"/>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Condition</div>
      <div class="cond-chips">
        <div class="cond-chip active" data-cond="all"      onclick="selectCond(this,'all')">All</div>
        <div class="cond-chip"        data-cond="Like New" onclick="selectCond(this,'Like New')">Like New</div>
        <div class="cond-chip"        data-cond="Good"     onclick="selectCond(this,'Good')">Good</div>
        <div class="cond-chip"        data-cond="Fair"     onclick="selectCond(this,'Fair')">Fair</div>
        <div class="cond-chip"        data-cond="Worn"     onclick="selectCond(this,'Worn')">Worn</div>
      </div>
    </div>

    <button class="apply-btn" onclick="applyFilters()">Apply Filters</button>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="toolbar">
      <div class="result-count" id="result-count">Loading items…</div>
      <select class="sort-select" id="sort-select" onchange="applyFilters()">
        <option value="newest">Newest First</option>
        <option value="match-best">Best match for you</option>
        <option value="value-high">Value: High → Low</option>
        <option value="value-low">Value: Low → High</option>
        <option value="name-az">Name A–Z</option>
      </select>
    </div>

    <!-- Skeleton while loading -->
    <div class="item-grid" id="item-grid"></div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<script src="js/api.js"></script>
<script>
  const API = window.HobbieAPI ? window.HobbieAPI.baseUrl : (
    window.location.hostname.includes('localhost') || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:8080'
      : 'https://hobbietrades-backend.onrender.com'
  );
  if (window.HobbieAPI) window.HobbieAPI.wakeBackend();

  // ─── Constants ───────────────────────────────────────────────────────────────
  const ITEMS_PER_PAGE = 12;
  const CAT_EMOJI = {
    Cameras:'📷', Instruments:'🎸', Gaming:'🎮',
    Sports:'🛹', Art:'🎨', Craft:'🧵', Other:'📦'
  };
  const CAT_BG = {
    Cameras:'#F0F4FF', Instruments:'#EAF3DE', Gaming:'#FAEEDA',
    Sports:'#E6F1FB', Art:'#FAECE7', Craft:'#FBEAF0', Other:'#F5F5F5'
  };
  const COND_CLASS = {
    'Like New':'cond-like-new', 'Good':'cond-good', 'Fair':'cond-fair', 'Worn':'cond-worn'
  };
  const AVATAR_COLORS = ['#AFA9EC','#9FE1CB','#F5C4B3','#85B7EB','#F7D08A','#B5EAD7','#C7CEEA'];

  // ─── State ───────────────────────────────────────────────────────────────────
  let allItems    = [];
  let filtered    = [];
  let currentPage = 1;
  let activeCat   = 'all';
  let activeCond  = 'all';
  let matchByItemId = {};
  const loggedInUserId = parseInt(localStorage.getItem('userId') || '', 10) || null;

  // ─── Init ────────────────────────────────────────────────────────────────────
  document.getElementById('nav-avatar').textContent =
    (localStorage.getItem('userName') || '?').charAt(0).toUpperCase();

  function skeletonHtml(count) {
    return Array(count).fill(`
      <div class="skeleton-card">
        <div class="skel skel-img"></div>
        <div class="skel-body">
          <div class="skel skel-line skel-w40" style="margin-bottom:6px"></div>
          <div class="skel skel-line skel-w80"></div>
          <div class="skel skel-line skel-w55"></div>
        </div>
      </div>`).join('');
  }

  function getSearchQuery() {
    return ((document.getElementById('search-input').value || '').trim() ||
      (document.getElementById('nav-search-input').value || '').trim()).toLowerCase();
  }

  // ─── Helpers ─────────────────────────────────────────────────────────────────
  function getInitials(name) {
    if (!name) return '?';
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  }
  function avatarColor(id) { return AVATAR_COLORS[(id||0) % AVATAR_COLORS.length]; }
  function formatPeso(v)   { return '₱' + Number(v||0).toLocaleString('en-PH'); }

  function getItemDisplayEmoji(title, category) {
    const t = (title || '').toLowerCase();
    if ((/\bpiano\b|grand piano|upright piano|digital piano/.test(t)) && !/nintendo/.test(t)) return '🎹';
    if (/\bcello\b|\bviolin\b|\bviola\b/.test(t)) return '🎻';
    if (/electric\s*guitar|acoustic\s*guitar|bass\s*guitar|\bguitar\b|\bbass\b(?!ball)/.test(t)) return '🎸';
    if (/\bdrum\b|cymbal/.test(t)) return '🥁';
    if (/\bsax|\btrumpet|\btrombone|\bclarinet|\bflute|\boboe|\bbassoon\b/.test(t)) return '🎷';
    if (/\bmicrophone\b|\bmic\b/.test(t)) return '🎤';
    if (/\bukulele\b|\bbanjo\b|\bharp\b|\bmandolin\b/.test(t)) return '🪕';
    if (/canon|nikon|sony\s*alpha|\bcamera\b|\bdslr\b|\blens\b|gopro|mirrorless/.test(t)) return '📷';
    if (/nintendo|playstation|\bps5\b|\bxbox\b|steam\s*deck|game\s*console/.test(t)) return '🎮';
    if (/\bbike\b|\bbicycle\b|skate|badminton|tennis|racket/.test(t)) return '🛹';
    if (/paint|canvas|brush|easel|sketch/.test(t)) return '🎨';
    if (/sewing|yarn|crochet|knit|craft/.test(t)) return '🧵';
    const fallback = { Cameras:'📷', Instruments:'🎼', Sports:'⚽', Gaming:'🎮', Art:'🎨', Craft:'🧵', Other:'📦' };
    return fallback[category] || '📦';
  }

  function condBadgeClass(cond) { return COND_CLASS[cond] || ''; }

  function escapeHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/"/g, '&quot;');
  }

  async function loadMatchHints() {
    matchByItemId = {};
    if (!loggedInUserId) return;
    try {
      const res = await fetch(`${API}/api/trades/matches?userId=${loggedInUserId}&limit=60`);
      if (!res.ok) return;
      const matches = await res.json();
      matches.forEach(m => {
        if (m.item && m.item.id != null) {
          matchByItemId[m.item.id] = {
            pct: m.matchPercent != null ? m.matchPercent : (m.matchScore || 0),
            reason: m.matchReason || ''
          };
        }
      });
    } catch (_) { /* optional */ }
  }

  // ─── Load items from API ──────────────────────────────────────────────────────
  async function loadItems() {
    try {
      const res = await fetch(`${API}/api/items`);
      if (!res.ok) throw new Error('Server error');
      allItems = await res.json();
      await loadMatchHints();
      updateCounts();
      applyFilters();
    } catch(e) {
      document.getElementById('item-grid').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <h3>Could not connect</h3>
          <p>Make sure your Spring Boot server is running on port 8080.</p>
        </div>`;
      document.getElementById('result-count').textContent = '';
    }
  }

  function updateCounts() {
    const cats = ['Cameras','Instruments'];
    cats.forEach(c => {
      const el = document.getElementById('cnt-' + c);
      if (el) el.textContent = allItems.filter(i => i.category === c).length;
    });
    const allEl = document.getElementById('cnt-all');
    if (allEl) allEl.textContent = allItems.length;
  }

  // ─── Filter + sort ────────────────────────────────────────────────────────────
  function applyFilters() {
    const q    = getSearchQuery();
    const minV = parseFloat(document.getElementById('min-val').value) || 0;
    const maxV = parseFloat(document.getElementById('max-val').value) || Infinity;
    const sort = document.getElementById('sort-select').value;

    filtered = allItems.filter(item => {
      if (activeCat !== 'all' && item.category !== activeCat) return false;
      if (activeCond !== 'all' && item.conditionLabel !== activeCond) return false;
      if (q && !item.title?.toLowerCase().includes(q) && !item.description?.toLowerCase().includes(q)) return false;
      const v = parseFloat(item.estimatedValue) || 0;
      if (v < minV || v > maxV) return false;
      return true;
    });

    if      (sort === 'value-high') filtered.sort((a,b) => (parseFloat(b.estimatedValue)||0) - (parseFloat(a.estimatedValue)||0));
    else if (sort === 'value-low')  filtered.sort((a,b) => (parseFloat(a.estimatedValue)||0) - (parseFloat(b.estimatedValue)||0));
    else if (sort === 'name-az')    filtered.sort((a,b) => (a.title||'').localeCompare(b.title||''));
    else if (sort === 'match-best') {
      filtered.sort((a, b) => {
        const ma = matchByItemId[a.id]?.pct ?? -1;
        const mb = matchByItemId[b.id]?.pct ?? -1;
        if (mb !== ma) return mb - ma;
        return b.id - a.id;
      });
    }
    else                            filtered.sort((a,b) => b.id - a.id);

    currentPage = 1;
    renderPage();
  }

  // ─── Render page ──────────────────────────────────────────────────────────────
  function renderPage() {
    const start     = (currentPage - 1) * ITEMS_PER_PAGE;
    const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

    document.getElementById('result-count').innerHTML =
      `<strong>${filtered.length}</strong> item${filtered.length !== 1 ? 's' : ''} found`;

    const grid = document.getElementById('item-grid');

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <h3>No items found</h3>
          <p>Try adjusting your filters or search term.</p>
        </div>`;
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = pageItems.map(item => {
      const emoji   = getItemDisplayEmoji(item.title, item.category);
      const bg      = CAT_BG[item.category]    || '#F5F5F5';
      const cond    = item.conditionLabel || '';
      const val     = parseFloat(item.estimatedValue) || 0;
      const seller  = item.user ? item.user.name : 'Unknown';
      const initials= getInitials(seller);
      const color   = avatarColor(item.user ? item.user.id : 0);

      const imgHtml = item.photoUrl
        ? `<img src="${API}${item.photoUrl}" alt="${escapeHtml(item.title)}"
               loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
           />
           <div class="card-emoji-placeholder" style="display:none;background:${bg}">${emoji}</div>`
        : `<div class="card-emoji-placeholder" style="background:${bg}">${emoji}</div>`;

      const mh = matchByItemId[item.id];
      let matchBadgeHtml = '';
      if (loggedInUserId && mh && mh.pct >= 22) {
        const tier = mh.pct >= 70 ? 'high' : mh.pct >= 45 ? 'med' : 'low';
        const tip = escapeHtml((mh.reason || 'Rule-based match').replace(/"/g, "'"));
        matchBadgeHtml = `<div class="card-match-badge ${tier}" title="${tip}">${mh.pct}% match</div>`;
      }
      const matchReasonHtml = (loggedInUserId && mh && mh.pct >= 22 && mh.reason)
        ? `<div class="card-match-reason">🎯 ${escapeHtml(mh.reason)}</div>`
        : '';

      return `
        <a class="item-card fade-in" href="item-detail.html?id=${item.id}">
          <div class="card-img" style="${item.photoUrl ? '' : `background:${bg}`}">
            ${imgHtml}
            <div class="card-trade-badge">TRADE</div>
            ${cond ? `<div class="card-cond-badge ${condBadgeClass(cond)}">${cond}</div>` : ''}
            ${matchBadgeHtml}
          </div>
          <div class="card-body">
            <div class="card-category">${item.category || 'General'}</div>
            <div class="card-title">${escapeHtml(item.title)}</div>
            <div class="card-meta">
              <span style="display:inline-flex;align-items:center;gap:3px">
                <span class="cdot" style="background:${condColor(cond)}"></span>${cond}
              </span>
            </div>
            ${matchReasonHtml}
            ${item.lookingFor ? `<div class="card-location">Wants: ${escapeHtml(item.lookingFor)}</div>` : ''}
            <div class="card-location">📍 ${escapeHtml(item.location || 'Philippines')}</div>
          </div>
          <div class="card-footer">
            <div class="card-value">${formatPeso(val)} <span>est.</span></div>
            <button class="trade-btn-sm" onclick="event.preventDefault();goTrade(${item.id})">Trade ⇄</button>
          </div>
        </a>`;
    }).join('');

    renderPagination();
  }

  function condColor(cond) {
    return { 'Like New':'#1D9E75', 'Good':'#639922', 'Fair':'#EF9F27', 'Worn':'#E24B4A' }[cond] || '#888';
  }

  // ─── Pagination ───────────────────────────────────────────────────────────────
  function renderPagination() {
    const total = Math.ceil(filtered.length / ITEMS_PER_PAGE);
    if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

    let html = '';
    if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">‹</button>`;
    for (let i = 1; i <= total; i++) {
      if (i === 1 || i === total || Math.abs(i - currentPage) <= 1) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
      } else if (Math.abs(i - currentPage) === 2) {
        html += `<button class="page-btn" style="pointer-events:none;border:none;opacity:0.4">…</button>`;
      }
    }
    if (currentPage < total) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">›</button>`;
    document.getElementById('pagination').innerHTML = html;
  }

  function goPage(n) {
    currentPage = n;
    renderPage();
    window.scrollTo({ top: 300, behavior: 'smooth' });
  }

  // ─── Category selection ───────────────────────────────────────────────────────
  function selectCatTab(el, cat) {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    activeCat = cat;
    // sync sidebar
    document.querySelectorAll('.sb-cat').forEach(p => p.classList.toggle('active', p.dataset.cat === cat));
    applyFilters();
  }

  function selectSbCat(el, cat) {
    document.querySelectorAll('.sb-cat').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    activeCat = cat;
    // sync top tabs
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
    applyFilters();
  }

  // ─── Condition selection ──────────────────────────────────────────────────────
  function selectCond(el, cond) {
    document.querySelectorAll('.cond-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeCond = cond;
  }

  // ─── Search sync (both inputs stay in sync) ───────────────────────────────────
  function syncSearch(el) {
    const other = el.id === 'search-input'
      ? document.getElementById('nav-search-input')
      : document.getElementById('search-input');
    other.value = el.value;
    applyFilters();
  }

  // ─── Trade shortcut ───────────────────────────────────────────────────────────
  function goTrade(id) {
    const userId = localStorage.getItem('userId');
    if (!userId) { window.location.href = 'index.html'; return; }
    window.location.href = `item-detail.html?id=${id}`;
  }

  // Initialize initial skeleton and optional query from URL (?q=...)
  document.getElementById('item-grid').innerHTML = skeletonHtml(8);
  const initialQ = new URLSearchParams(window.location.search).get('q');
  if (initialQ) {
    document.getElementById('search-input').value = initialQ;
    document.getElementById('nav-search-input').value = initialQ;
  }

  loadItems();
</script>
</body>
</html>
