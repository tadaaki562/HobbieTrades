<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HobbieTrades — Item Detail</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    /* ── HERO ── */
    .detail-hero {
      background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand) 100%);
      padding: 32px 40px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .detail-hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    .detail-hero::after {
      content: '';
      position: absolute;
      bottom: -50px; left: 25%;
      width: 260px; height: 260px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-link {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }
    .back-link:hover { color: white; }
    .back-link i { width: 16px; height: 16px; }
    .hero-crumb {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
    }
    .hero-crumb-current {
      color: white;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
    }

    /* ── DETAIL LAYOUT ── */
    .detail-wrap {
      max-width: 1200px;
      margin: 40px auto 60px;
      padding: 0 40px;
      display: grid;
      grid-template-columns: 440px 1fr;
      gap: 40px;
      align-items: start;
    }

    /* ── LEFT: IMAGE COLUMN ── */
    .img-col { display: flex; flex-direction: column; gap: 16px; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards; animation-delay: 0.05s; }

    .detail-img-box {
      border-radius: var(--radius-lg);
      height: 440px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      background: var(--white);
      box-shadow: var(--shadow-sm);
    }
    .detail-img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .detail-img-box:hover img {
      transform: scale(1.05);
    }
    .img-placeholder-icon {
      color: var(--text-tertiary);
    }
    .img-placeholder-icon i {
      width: 64px;
      height: 64px;
      stroke-width: 1.5;
    }

    .detail-trade-badge {
      position: absolute;
      top: 16px; left: 16px;
      background: var(--white);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 6px;
      letter-spacing: 0.05em;
      z-index: 2;
      box-shadow: var(--shadow-sm);
    }
    .detail-cond-badge {
      position: absolute;
      top: 16px; right: 16px;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 6px;
      z-index: 2;
      background: var(--white);
      color: var(--text-secondary);
      box-shadow: var(--shadow-sm);
    }

    /* Quick stats row below image */
    .img-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .img-stat {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .img-stat-val {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .img-stat-lbl {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ── RIGHT: INFO COLUMN ── */
    .info-col {
      display: flex;
      flex-direction: column;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
      animation-delay: 0.15s;
    }

    .detail-category {
      font-size: 13px;
      font-weight: 600;
      color: var(--brand);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .detail-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    .detail-meta {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .detail-meta strong { color: var(--text); font-weight: 500; }
    .meta-dot { color: var(--border); }

    /* Value bar */
    .value-bar {
      background: var(--brand-light);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .value-bar-left { font-size: 14px; color: var(--brand-dark); font-weight: 500; }
    .value-bar-amount {
      font-size: 24px;
      font-weight: 700;
      color: var(--brand-dark);
    }

    /* Match reason / AI highlight */
    .detail-match-banner {
      background: var(--green-light);
      border: 1px solid #A7F3D0;
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #065F46;
      line-height: 1.5;
    }
    .detail-match-banner strong { font-weight: 600; }

    /* Description */
    .desc-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .desc-text {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 24px;
      white-space: pre-wrap;
    }

    /* Looking For */
    .looking-box {
      background: var(--bg);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .looking-icon {
      color: var(--brand);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .looking-icon i { width: 20px; height: 20px; }
    .looking-text { font-size: 14px; color: var(--text); font-weight: 500; flex: 1; }

    .location-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }
    .location-row i { width: 16px; height: 16px; }

    /* Seller card */
    .seller-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      box-shadow: var(--shadow-sm);
    }
    .seller-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--brand);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .seller-info { flex: 1; }
    .seller-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .seller-stats {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .seller-stats i { width: 12px; height: 12px; color: var(--orange); fill: var(--orange); }

    /* Action buttons */
    .action-row {
      display: flex;
      gap: 16px;
    }
    .btn-propose { flex: 2; font-size: 16px; padding: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-propose i { width: 18px; height: 18px; }
    .btn-message { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); font-size: 16px; padding: 14px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px;}
    .btn-message i { width: 18px; height: 18px; }
    .btn-message:hover { background: var(--border-light); }

    /* Hobby proofs */
    .hobby-gallery {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .hobby-img-box {
      aspect-ratio: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .hobby-img-box img { width: 100%; height: 100%; object-fit: cover; }

    @media (max-width: 960px) {
      .detail-wrap { grid-template-columns: 1fr; padding: 0 24px 40px; margin-top: 24px; gap: 32px; }
      .detail-img-box { height: auto; aspect-ratio: 1; }
      .action-row { flex-direction: column; }
    }
    @media (max-width: 480px) {
      .detail-hero { padding: 24px 20px; }
      .detail-wrap { padding: 0 20px 40px; margin-top: 20px; }
      .img-stats { grid-template-columns: 1fr; }
      .detail-title { font-size: 24px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="browse.html" class="logo">HobbieTrades</a>
  <div class="nav-search">
    <i data-feather="search" class="search-icon"></i>
    <input type="text" id="nav-search-input" placeholder="Search items to trade..." onkeydown="if(event.key==='Enter') window.location.href='browse.html?q='+this.value"/>
  </div>
  <div class="nav-links">
    <a href="browse.html"        class="nav-link active">Browse</a>
    <a href="for-you.html"       class="nav-link">For You</a>
    <a href="messages.html"      class="nav-link">Messages</a>
    <a href="create-listing.html" class="nav-link">+ List Item</a>
    <a href="profile.html"       class="nav-avatar" id="nav-avatar">?</a>
  </div>
</nav>

<div class="detail-hero">
  <div class="hero-inner">
    <a href="browse.html" class="back-link"><i data-feather="arrow-left"></i> Browse</a>
    <span class="hero-crumb">/</span>
    <span class="hero-crumb-current" id="hero-title">Loading…</span>
  </div>
</div>

<div class="detail-wrap page-enter" id="main-content">
  <!-- Skeletons... -->
</div>

<script src="js/api.js"></script>
<script>
  feather.replace();

  const API = window.HobbieAPI ? window.HobbieAPI.baseUrl : (
    window.location.hostname.includes('localhost') || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:8080'
      : 'https://hobbietrades-backend.onrender.com'
  );
  if (window.HobbieAPI) window.HobbieAPI.wakeBackend();

  const urlParams = new URLSearchParams(window.location.search);
  const itemId = urlParams.get('id');
  const loggedInUserId = parseInt(localStorage.getItem('userId') || '0', 10);
  const loggedInUserName = localStorage.getItem('userName') || '?';
  
  document.getElementById('nav-avatar').textContent = loggedInUserName.charAt(0).toUpperCase();

  const CAT_ICON = { Cameras:'camera', Instruments:'music', Other:'box' };

  function formatPeso(v) { return '₱' + Number(v || 0).toLocaleString('en-PH'); }

  function escapeHtml(s) {
    return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
  }

  function getInitials(name) {
    if (!name) return '?';
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  const AVATAR_COLORS = ['#AFA9EC','#9FE1CB','#F5C4B3','#85B7EB','#F7D08A','#B5EAD7','#C7CEEA'];
  function avatarColor(id) { return AVATAR_COLORS[(id||0) % AVATAR_COLORS.length]; }

  async function loadItem() {
    if (!itemId) {
      document.getElementById('main-content').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-secondary)">Item not found.</div>';
      return;
    }

    try {
      const res = await fetch(`${API}/api/items/${itemId}`);
      if (!res.ok) throw new Error('Not found');
      const item = await res.json();
      
      let matchHtml = '';
      if (loggedInUserId && item.user && item.user.id !== loggedInUserId) {
        try {
          const mRes = await fetch(`${API}/api/trades/matches?userId=${loggedInUserId}&limit=60`);
          if (mRes.ok) {
            const matches = await mRes.json();
            const mh = matches.find(m => m.item && m.item.id == itemId);
            if (mh && mh.matchPercent >= 22) {
              matchHtml = `
                <div class="detail-match-banner">
                  <i data-feather="target" style="width:16px;height:16px;vertical-align:text-bottom;margin-right:6px"></i>
                  <strong>${mh.matchPercent}% Match:</strong> ${escapeHtml(mh.matchReason || 'Great potential trade.')}
                </div>`;
            }
          }
        } catch (_) {}
      }

      const seller = item.user || {};
      const sId    = seller.id || 0;
      const sName  = seller.name || 'Unknown User';
      const sInit  = getInitials(sName);
      const sColor = avatarColor(sId);
      const sLoc   = item.location || seller.location || 'Philippines';
      const cond   = item.conditionLabel || '';
      const icon   = CAT_ICON[item.category] || 'box';
      
      const imgSrc = window.HobbieAPI
        ? window.HobbieAPI.resolveImageUrl(item.photoUrl, item.id)
        : (item.photoUrl ? `${API}${item.photoUrl}` : `${API}/api/items/${item.id}/photo`);

      let hPhotos = '';
      if (item.hobbyPhotoUrls && item.hobbyPhotoUrls.length > 0) {
        const boxes = item.hobbyPhotoUrls.map((url, idx) => {
           const u = window.HobbieAPI ? window.HobbieAPI.resolveImageUrl(url, item.id, idx+1) : `${API}${url}`;
           return `<div class="hobby-img-box"><img src="${u}" loading="lazy" /></div>`;
        });
        hPhotos = `<div class="hobby-gallery">${boxes.join('')}</div>`;
      }

      const dateStr = item.createdAt ? new Date(item.createdAt).toLocaleDateString() : 'Recently';

      let actionRow = '';
      if (!loggedInUserId) {
        actionRow = `<a href="index.html" class="btn btn-primary btn-full btn-lg" style="margin-top:16px">Log in to propose a trade</a>`;
      } else if (sId === loggedInUserId) {
        actionRow = `<a href="profile.html" class="btn btn-outline btn-full btn-lg" style="margin-top:16px">View your profile</a>`;
      } else {
        actionRow = `
          <div class="action-row" style="margin-top:16px">
            <a href="propose-trade.html?targetItemId=${item.id}" class="btn btn-primary btn-propose"><i data-feather="refresh-cw"></i> Propose a trade</a>
            <a href="messages.html?userId=${sId}&targetItemId=${item.id}" class="btn btn-message"><i data-feather="message-circle"></i> Message</a>
          </div>`;
      }

      document.getElementById('hero-title').textContent = item.title;

      document.getElementById('main-content').innerHTML = `
        <div class="img-col">
          <div class="detail-img-box">
            ${imgSrc 
              ? `<img src="${imgSrc}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
                 <div class="img-placeholder-icon" style="display:none"><i data-feather="${icon}"></i></div>`
              : `<div class="img-placeholder-icon"><i data-feather="${icon}"></i></div>`
            }
            <div class="detail-trade-badge">TRADE</div>
            ${cond ? `<div class="detail-cond-badge">${cond}</div>` : ''}
          </div>
          <div class="img-stats">
            <div class="img-stat">
              <div class="img-stat-val">${cond || '—'}</div>
              <div class="img-stat-lbl">Condition</div>
            </div>
            <div class="img-stat">
              <div class="img-stat-val">${item.category || '—'}</div>
              <div class="img-stat-lbl">Category</div>
            </div>
            <div class="img-stat">
              <div class="img-stat-val">${seller.tradeCount != null ? seller.tradeCount : '—'}</div>
              <div class="img-stat-lbl">Past Trades</div>
            </div>
          </div>
          ${hPhotos}
        </div>

        <div class="info-col fade-in">
          <div class="detail-category">${item.category || 'General'}</div>
          <div class="detail-title">${escapeHtml(item.title)}</div>
          
          <div class="detail-meta">
            <span>Listed ${dateStr}</span>
            <span class="meta-dot">•</span>
            <span>ID: ${item.id}</span>
          </div>

          ${matchHtml}

          <div class="value-bar">
            <div class="value-bar-left">Estimated Value</div>
            <div class="value-bar-amount">${formatPeso(item.estimatedValue)}</div>
          </div>

          <div class="desc-label">About this item</div>
          <div class="desc-text">${escapeHtml(item.description) || 'No description provided.'}</div>

          ${item.lookingFor ? `
          <div class="looking-box">
            <div class="looking-icon"><i data-feather="refresh-cw"></i></div>
            <div class="looking-text"><strong>Looking for:</strong> ${escapeHtml(item.lookingFor)}</div>
          </div>` : `
          <div class="looking-box">
            <div class="looking-icon"><i data-feather="check-circle"></i></div>
            <div class="looking-text"><strong>Open to offers</strong></div>
          </div>`}

          <div class="location-row">
            <i data-feather="map-pin"></i> ${escapeHtml(sLoc)}
          </div>

          <div class="seller-card">
            <div class="seller-avatar" style="background:${sColor}">${sInit}</div>
            <div class="seller-info">
              <div class="seller-name">${escapeHtml(sName)}</div>
              <div class="seller-stats">
                <i data-feather="star"></i> ${(parseFloat(seller.rating)||0).toFixed(1)} Rating
              </div>
            </div>
          </div>

          ${actionRow}
        </div>
      `;

      feather.replace();

    } catch(e) {
      document.getElementById('main-content').innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:60px;background:var(--white);border-radius:var(--radius-md);border:1px solid var(--border)">
          <i data-feather="alert-circle" style="color:var(--text-tertiary);width:48px;height:48px;margin-bottom:16px"></i>
          <h3 style="margin-bottom:8px">Error loading item</h3>
          <p style="color:var(--text-secondary)">Please check your connection and ensure the server is running.</p>
        </div>`;
      feather.replace();
    }
  }

  loadItem();
</script>
</body>
</html>
