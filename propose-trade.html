<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HobbieTrades — Propose Trade</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    .propose-wrap { max-width: 800px; margin: 40px auto; padding: 0 40px; }

    .page-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; color: var(--text); }
    .page-sub { font-size: 15px; color: var(--text-secondary); margin-bottom: 32px; }

    /* TRADE COLUMNS */
    .trade-cols {
      display: grid;
      grid-template-columns: 1fr 48px 1fr;
      gap: 16px;
      align-items: center;
      margin-bottom: 32px;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
      animation-delay: 0.05s;
    }

    .trade-col {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
    }

    .trade-col-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .trade-item-box {
      border-radius: var(--radius-md);
      padding: 20px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      border: 1px solid var(--border);
    }

    .trade-item-offer { background: var(--brand-light); border-color: var(--brand-mid); color: var(--brand-dark); }
    .trade-item-receive { background: var(--green-light); border-color: #A7F3D0; color: #065F46; }

    .trade-item-icon { margin-bottom: 12px; opacity: 0.8; }
    .trade-item-icon i { width: 40px; height: 40px; stroke-width: 1.5; }
    .trade-item-val { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-top: 4px; }

    .change-link { font-size: 13px; color: var(--brand); text-align: center; margin-top: 12px; cursor: pointer; text-decoration: none; font-weight: 500; display: block; }
    .change-link:hover { text-decoration: underline; }

    .swap-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      box-shadow: var(--shadow-sm);
    }

    /* MY ITEMS PICKER */
    .items-picker {
      display: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-bottom: 24px;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
      animation-delay: 0.1s;
    }
    .items-picker.open { display: block; }
    .picker-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .picker-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      font-weight: 500;
    }
    .picker-item:hover { border-color: var(--brand); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .picker-item.sel { border-color: var(--brand); background: var(--brand-light); color: var(--brand-dark); box-shadow: 0 0 0 2px var(--brand-glow); }
    .picker-item-icon { margin-bottom: 8px; color: var(--text-secondary); }
    .picker-item-icon i { width: 24px; height: 24px; }
    .picker-item.sel .picker-item-icon { color: var(--brand); }

    /* FAIR VALUE BANNER */
    .fair-banner { display: flex; align-items: flex-start; gap: 12px; padding: 16px; border-radius: var(--radius-md); margin-bottom: 32px; font-size: 14px; }
    .fair-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .fair-icon i { width: 14px; height: 14px; color: white; }
    .fair-good { background: var(--green-light); border: 1px solid #A7F3D0; color: #065F46; }
    .fair-good .fair-icon { background: var(--green); }
    .fair-warn { background: var(--orange-light); border: 1px solid #FDE68A; color: #92400E; }
    .fair-warn .fair-icon { background: var(--orange); }

    /* NOTE */
    .note-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* ALERTS */
    #alert-box { display: none; }

    @media (max-width: 768px) {
      .propose-wrap { padding: 24px; margin: 16px auto; }
      .trade-cols { grid-template-columns: 1fr; gap: 16px; }
      .swap-icon { transform: rotate(90deg); margin: 0 auto; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="browse.html" class="logo">HobbieTrades</a>
  <div class="nav-links" style="margin-left:auto">
    <a href="browse.html"        class="nav-link">Browse</a>
    <a href="for-you.html"       class="nav-link">For You</a>
    <a href="messages.html"      class="nav-link">Messages</a>
    <a href="create-listing.html" class="nav-link">+ List Item</a>
    <a href="profile.html"       class="nav-avatar" id="nav-avatar">?</a>
  </div>
</nav>

<div class="propose-wrap page-enter">
  <h1 class="page-title">Propose a Trade</h1>
  <div class="page-sub">Select an item from your inventory to offer in exchange.</div>

  <div id="alert-box" class="alert"></div>

  <div class="trade-cols">
    <!-- OFFER (Left) -->
    <div class="trade-col">
      <div class="trade-col-label">You Offer</div>
      <div class="trade-item-box trade-item-offer" id="box-offer">
        <div class="trade-item-icon"><i data-feather="box"></i></div>
        <div id="offer-title">Select an item</div>
        <div class="trade-item-val" id="offer-val">—</div>
      </div>
      <div class="change-link" onclick="togglePicker()">Change Item</div>
    </div>

    <!-- ARROWS -->
    <div class="swap-icon"><i data-feather="refresh-cw"></i></div>

    <!-- RECEIVE (Right) -->
    <div class="trade-col">
      <div class="trade-col-label">You Receive</div>
      <div class="trade-item-box trade-item-receive" id="box-receive">
        <div class="trade-item-icon"><i data-feather="box"></i></div>
        <div id="receive-title">Loading...</div>
        <div class="trade-item-val" id="receive-val">—</div>
      </div>
    </div>
  </div>

  <div class="items-picker" id="items-picker">
    <div class="picker-title"><i data-feather="list"></i> Your Active Listings</div>
    <div class="picker-grid" id="picker-grid">
      <!-- items injected here -->
    </div>
  </div>

  <div id="fair-banner" class="fair-banner" style="display:none">
    <div class="fair-icon" id="fair-icon"></div>
    <div id="fair-text"></div>
  </div>

  <form onsubmit="event.preventDefault(); submitTrade();" class="animate-slide-up stagger-3">
    <div class="form-group">
      <label class="note-label">Message (Optional)</label>
      <textarea class="form-control" id="f-message" placeholder="Hi! I'm interested in trading my item for yours..."></textarea>
    </div>

    <div style="display:flex;gap:16px;margin-top:32px">
      <a href="#" id="cancel-link" class="btn btn-outline" style="flex:1;text-align:center">Cancel</a>
      <button type="submit" class="btn btn-primary" id="btn-submit" style="flex:2" disabled>Send Proposal</button>
    </div>
  </form>

</div>

<script src="js/api.js"></script>
<script>
  feather.replace();

  const API = window.HobbieAPI ? window.HobbieAPI.baseUrl : (
    window.location.hostname.includes('localhost') || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:8080'
      : 'https://hobbietrades-backend.onrender.com'
  );
  if (window.HobbieAPI) window.HobbieAPI.wakeBackend();

  const urlParams = new URLSearchParams(window.location.search);
  const targetItemIdStr = urlParams.get('targetItemId');
  const targetUserIdStr = urlParams.get('targetUserId');

  const loggedInUserId = localStorage.getItem('userId');
  if (!loggedInUserId || (!targetItemIdStr && !targetUserIdStr)) {
    window.location.href = 'index.html';
  }

  document.getElementById('nav-avatar').textContent = (localStorage.getItem('userName') || '?').charAt(0).toUpperCase();

  const CAT_ICON = { Cameras:'camera', Instruments:'music', Other:'box' };

  function formatPeso(v) { return '₱' + Number(v||0).toLocaleString('en-PH'); }

  function escapeHtml(s) {
    return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
  }

  let myItems = [];
  let targetItem = null;
  let selectedItemId = null;
  let targetUserId = parseInt(targetUserIdStr, 10) || null;

  async function loadData() {
    try {
      const uid = parseInt(loggedInUserId, 10);
      const resMy = await fetch(`${API}/api/items/user/${uid}`);
      if (resMy.ok) {
        myItems = (await resMy.json()).filter(i =>
          i.isAvailable &&
          i.user &&
          i.user.id === uid
        );
      }

      if (targetItemIdStr) {
        const resTarget = await fetch(`${API}/api/items/${targetItemIdStr}`);
        if (resTarget.ok) {
          targetItem = await resTarget.json();
          targetUserId = targetItem.user.id;
        }
      }

      if (targetUserId && targetUserId === uid) {
        window.location.href = 'browse.html';
        return;
      }

      if (!targetItem && targetItemIdStr) {
        throw new Error('Target item not found');
      }

      if (targetUserId) {
        document.getElementById('cancel-link').href = targetItem
          ? `item-detail.html?id=${targetItem.id}`
          : `messages.html?userId=${targetUserId}`;
      } else {
        document.getElementById('cancel-link').href = 'browse.html';
      }

      renderUI();
    } catch(e) {
      const b = document.getElementById('alert-box');
      b.style.display = 'flex';
      b.className = 'alert alert-err';
      b.innerHTML = `<i data-feather="alert-circle"></i> Error loading data.`;
      feather.replace();
    }
  }

  function renderUI() {
    const pGrid = document.getElementById('picker-grid');
    const submitBtn = document.getElementById('btn-submit');
    const changeLink = document.querySelector('.change-link');

    if (myItems.length === 0) {
      pGrid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--text-secondary);font-size:14px">
        You don't have any active listings to offer.<br/>
        <a href="create-listing.html" class="btn btn-primary btn-sm" style="margin-top:16px;display:inline-flex">List an item first</a>
      </div>`;
      submitBtn.disabled = true;
      if (changeLink) changeLink.style.display = 'none';
      document.getElementById('offer-title').textContent = 'No items to offer';
      document.getElementById('offer-val').textContent = '—';
    } else {
      if (changeLink) changeLink.style.display = 'block';
      pGrid.innerHTML = myItems.map(item => {
        const icon = CAT_ICON[item.category] || 'box';
        return `
          <div class="picker-item" onclick="selectItem(${item.id})" id="pi-${item.id}">
            <div class="picker-item-icon"><i data-feather="${icon}"></i></div>
            <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(item.title)}</div>
            <div style="color:var(--text-secondary);font-size:11px;margin-top:2px">${formatPeso(item.estimatedValue)}</div>
          </div>
        `;
      }).join('');
    }

    if (!targetItem) {
      const b = document.getElementById('alert-box');
      b.style.display = 'flex';
      b.className = 'alert alert-err';
      b.innerHTML = `<i data-feather="alert-circle"></i> Select an item from Browse to propose a trade against.`;
      submitBtn.disabled = true;
      document.getElementById('receive-title').textContent = 'No target item';
      document.getElementById('receive-val').textContent = '—';
      feather.replace();
      return;
    }

    const icon = CAT_ICON[targetItem.category] || 'box';
    document.getElementById('receive-title').textContent = targetItem.title;
    document.getElementById('receive-val').textContent = formatPeso(targetItem.estimatedValue);
    document.getElementById('box-receive').querySelector('.trade-item-icon').innerHTML = `<i data-feather="${icon}"></i>`;

    if (myItems.length === 1 && !selectedItemId) {
      selectItem(myItems[0].id);
    } else if (selectedItemId) {
      selectItem(selectedItemId);
    } else if (myItems.length > 0) {
      togglePicker(true);
      submitBtn.disabled = true;
    }

    feather.replace();
  }

  function togglePicker(forceOpen) {
    const p = document.getElementById('items-picker');
    if (forceOpen === true) p.classList.add('open');
    else if (forceOpen === false) p.classList.remove('open');
    else p.classList.toggle('open');
  }

  function selectItem(id) {
    selectedItemId = id;
    document.querySelectorAll('.picker-item').forEach(el => el.classList.remove('sel'));
    const el = document.getElementById('pi-' + id);
    if(el) el.classList.add('sel');

    const item = myItems.find(i => i.id === id);
    if (item) {
      const icon = CAT_ICON[item.category] || 'box';
      document.getElementById('offer-title').textContent = item.title;
      document.getElementById('offer-val').textContent = formatPeso(item.estimatedValue);
      document.getElementById('box-offer').querySelector('.trade-item-icon').innerHTML = `<i data-feather="${icon}"></i>`;
      feather.replace();
      togglePicker(false);
      
      document.getElementById('btn-submit').disabled = false;
      checkFairness(item, targetItem);
    }
  }

  function checkFairness(offer, receive) {
    const banner = document.getElementById('fair-banner');
    if (!offer || !receive) { banner.style.display = 'none'; return; }

    const oVal = offer.estimatedValue || 0;
    const rVal = receive.estimatedValue || 0;

    if (oVal === 0 || rVal === 0) { banner.style.display = 'none'; return; }

    const diff = Math.abs(oVal - rVal);
    const pct = diff / rVal;

    const icon = document.getElementById('fair-icon');
    const txt = document.getElementById('fair-text');

    banner.style.display = 'flex';

    if (pct <= 0.15) {
      banner.className = 'fair-banner fair-good';
      icon.innerHTML = '<i data-feather="check"></i>';
      txt.innerHTML = `<strong>Fair Trade:</strong> Values are very close (${formatPeso(oVal)} vs ${formatPeso(rVal)}).`;
    } else {
      banner.className = 'fair-banner fair-warn';
      icon.innerHTML = '<i data-feather="alert-triangle"></i>';
      if (oVal > rVal) {
        txt.innerHTML = `<strong>Value Mismatch:</strong> Your item is worth more (${formatPeso(oVal)} vs ${formatPeso(rVal)}). Consider asking for cash on top.`;
      } else {
        txt.innerHTML = `<strong>Value Mismatch:</strong> Their item is worth more (${formatPeso(rVal)} vs ${formatPeso(oVal)}). Consider offering cash on top.`;
      }
    }
    feather.replace();
  }

  async function submitTrade() {
    if (!selectedItemId || !targetUserId || !targetItem) return;
    if (myItems.length === 0) return;
    
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerHTML = 'Sending...';

    try {
      const payload = {
        proposerId: parseInt(loggedInUserId, 10),
        receiverId: targetUserId,
        offeredItemId: selectedItemId,
        requestedItemId: targetItem.id
      };

      const res = await fetch(`${API}/api/trades`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.success) throw new Error(data.message || 'Failed');

      const msg = document.getElementById('f-message').value.trim();
      if (msg && data.tradeId) {
        await fetch(`${API}/api/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            tradeId: data.tradeId,
            senderId: parseInt(loggedInUserId, 10),
            content: msg
          })
        });
      }

      const b = document.getElementById('alert-box');
      b.style.display = 'flex';
      b.className = 'alert alert-green';
      b.innerHTML = `<i data-feather="check-circle" style="color:var(--green)"></i> Trade proposed!`;
      feather.replace();

      setTimeout(() => { window.location.href = `messages.html?tradeId=${data.tradeId}`; }, 1200);

    } catch(e) {
      const b = document.getElementById('alert-box');
      b.style.display = 'flex';
      b.className = 'alert alert-err';
      b.innerHTML = `<i data-feather="alert-circle"></i> ${escapeHtml(e.message || 'Failed to send proposal.')}`;
      feather.replace();
      btn.disabled = false;
      btn.innerHTML = 'Send Proposal';
    }
  }

  loadData();
</script>
</body>
</html>
